<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Event Management</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { padding: 1.5rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; text-align: center; }
        .warning {
            background: rgba(255,107,107,0.08);
            border: 1px solid rgba(255,107,107,0.3);
            color: #ff6b6b;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.82rem;
        }
        .section {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.75rem;
            margin-bottom: 1.25rem;
        }
        .section-title { font-size: 0.85rem; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1.25rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: var(--text); font-size: 0.82rem; }
        input[type="text"],
        input[type="date"],
        input[type="time"],
        input[type="number"] {
            width: 100%; padding: 0.65rem 0.875rem;
            background: var(--s2); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.85rem; font-family: var(--body); transition: border-color 0.1s;
        }
        input:focus { outline: none; border-color: var(--teal); }
        .btn {
            background: var(--teal); color: var(--bg); border: none; border-radius: 4px;
            padding: 0.65rem 1.5rem; font-size: 0.85rem; font-weight: 700; font-family: var(--body);
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-secondary { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
        .corps-selection { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; margin-bottom: 1rem; }
        .corps-checkbox {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.75rem; background: var(--s2);
            border-radius: 4px; border: 1px solid var(--border);
        }
        .corps-checkbox:hover { background: var(--s3); }
        .corps-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--teal); }
        .corps-checkbox label { margin: 0; cursor: pointer; font-weight: 500; font-size: 0.82rem; }
        .event-list { margin-top: 1.5rem; }
        .event-item {
            background: var(--s2); border: 1px solid var(--border); border-radius: 4px;
            padding: 1.25rem; margin-bottom: 0.75rem;
        }
        .event-item:hover { background: var(--s3); }
        .event-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem; }
        .event-info { flex: 1; }
        .event-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.4rem; color: var(--teal); }
        .event-details { color: var(--text-2); font-size: 0.82rem; line-height: 1.5; }
        .event-actions { display: flex; gap: 0.4rem; }
        .event-status { padding: 3px 10px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
        .status-upcoming { background: var(--teal-bg); color: var(--teal); border: 1px solid var(--teal-dim); }
        .status-completed { background: rgba(255,215,0,0.08); color: #b8a600; border: 1px solid rgba(255,215,0,0.2); }
        .event-corps { margin-top: 0.4rem; font-size: 0.78rem; color: var(--text-2); }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto;
        }
        .modal-content {
            background: var(--s1); border: 1px solid var(--border); border-radius: 6px;
            padding: 1.75rem; margin: 2rem auto; max-width: 780px; position: relative;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--teal); }
        .close-btn { background: none; border: none; color: var(--text-2); font-size: 1.5rem; cursor: pointer; }
        .close-btn:hover { color: var(--text); }
        .score-grid { display: grid; gap: 1.25rem; }
        .corps-score-section { background: var(--s2); border-radius: 4px; padding: 1.25rem; border: 1px solid var(--border); }
        .corps-score-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--text); }
        .score-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
        .score-input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .score-input-group label { font-size: 0.78rem; color: var(--text-2); }
        .score-input-group input { padding: 0.5rem 0.65rem; font-size: 0.82rem; }
        .message { margin-top: 0.75rem; padding: 0.75rem 1rem; border-radius: 4px; text-align: center; display: none; font-size: 0.82rem; }
        .message.success { background: var(--teal-bg); border: 1px solid var(--teal-dim); color: var(--teal); }
        .message.error { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; }
        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            color: var(--teal); text-decoration: none; font-weight: 600;
            margin-bottom: 1.5rem; font-size: 0.82rem;
        }
        .back-link:hover { opacity: 0.8; }
    </style>
</head>

    <div class="container">
        <a href="/dashboard.html" class="back-link">← Back to Dashboard</a>
        
        <h1>Event Management</h1>
        
        <div class="warning">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        const allCorps = window.DCI_WORLD_CLASS_CORPS || [];

        let currentEventId = null;
        let currentEventCorps = [];
		let currentEditEventId = null;
        // Check if user is admin
        async function checkAdminAccess() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const user = (session && session.user) || null;
            
            if (!user) {
                window.location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search);
                return false;
            }
            
            // Check if user has admin privileges
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('is_admin')
                .eq('id', user.id)
                .single();
            
            if (!profile || !profile.is_admin) {
                alert('Access denied. Admin only.');
                window.location.href = '/dashboard.html';
                return false;
            }
            
            return true;
        }

        // Initialize corps checkboxes
        function initializeCorpsSelection() {
            const container = document.getElementById('corpsSelection');
            container.innerHTML = allCorps.map(corps => `
                <div class="corps-checkbox">
                    <input type="checkbox" id="corps_${corps.replace(/\s+/g, '_')}" value="${corps}">
                    <label for="corps_${corps.replace(/\s+/g, '_')}">${corps}</label>
                </div>
            `).join('');
        }

        // Toggle all corps selection
        function toggleAllCorps() {
            const checkboxes = document.querySelectorAll('#corpsSelection input[type="checkbox"]');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => cb.checked = !allChecked);
        }

        // Get selected corps
        function getSelectedCorps() {
            const checkboxes = document.querySelectorAll('#corpsSelection input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // Load and display events
        async function loadEvents() {
            const { data: events, error } = await supabaseClient
                .from('events')
                .select('*')
                .order('date', { ascending: false });
            
            if (error) {
                console.error('Error loading events:', error);
                return;
            }
            
            const eventList = document.getElementById('eventList');
            
            if (events.length === 0) {
                eventList.innerHTML = '<p style="text-align: center; color: #666;">No events found</p>';
                return;
            }
            
            eventList.innerHTML = events.map(event => {
                const corpsListStr = event.corps_list ? JSON.stringify(event.corps_list).replace(/"/g, '&quot;') : '[]';
                return `
                <div class="event-item">
                    <div class="event-header">
                        <div class="event-info">
                            <div class="event-name">${escapeHtml(event.name)}</div>
                            <div class="event-details">
                                ${escapeHtml(event.date)}
                                ${event.time ? `at ${escapeHtml(event.time)}` : ''}
                                • ${escapeHtml(event.location || 'Location TBD')}
                            </div>
                            <div class="event-corps">
                                ${event.corps_list ? `${event.corps_list.length} corps attending` : 'No corps assigned'}
                            </div>
                        </div>
                        <div class="event-actions">
                            <div class="event-status ${event.is_completed ? 'status-completed' : 'status-upcoming'}">
                                ${event.is_completed ? 'Completed' : 'Upcoming'}
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                        <button class="btn btn-secondary" onclick="editScores('${jsStr(event.id)}', '${jsStr(event.name)}', '${corpsListStr}')">
                            ${event.is_completed ? 'Edit' : 'Enter'} Scores
                        </button>
                        <button class="btn btn-danger" onclick="deleteEvent('${jsStr(event.id)}', '${jsStr(event.name)}')">
                            Delete Event
                        </button>
						<button class="btn" onclick="openEditDateTime('${jsStr(event.id)}', '${jsStr(event.name)}', '${jsStr(event.date)}', '${jsStr(event.time || '')}')">
    Change Date/Time
</button>

                    </div>
                </div>
            `}).join('');
			console.log("Events loaded:", events);
        }

        // Add new event

            e.preventDefault();
            
            const name = document.getElementById('eventName').value;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const location = document.getElementById('eventLocation').value;
            const corpsList = filterWorldClassCorps(getSelectedCorps());
            // determine timezone
const parts = location.split(',');
const stateAbbr = parts[parts.length - 1].trim().toUpperCase();
const timezoneMap = {
  // same mapping as above
};
const tz = timezoneMap[stateAbbr] || 'America/Chicago';
            if (corpsList.length === 0) {
                showMessage('Please select at least one corps', 'error');
                return;
            }
            
const { data, error } = await supabaseClient
  .from('events')
  .insert({
    name: name,
    date: date,
    time: time,
    location: location,
    corps_list: corpsList,
    timezone: tz
  })
  .select()
  .single();
            
            if (error) {

        // Delete event
        async function deleteEvent(eventId, eventName) {
            if (!confirm(`Are you sure you want to delete "${eventName}"? This will also delete all predictions and scores for this event.`)) {
                return;
            }
            
            const { error } = await supabaseClient
                .from('events')
                .delete()
                .eq('id', eventId);
            
            if (error) {
                showMessage('Error deleting event: ' + error.message, 'error');
                return;
            }
            
            showMessage('Event deleted successfully', 'success');
            loadEvents();
        }

        // Open score entry modal
        async function editScores(eventId, eventName, corpsListJson) {
            currentEventId = eventId;
            
            try {
                // Parse the corps list
                currentEventCorps = filterWorldClassCorps(corpsListJson && corpsListJson !== '[]' ? JSON.parse(corpsListJson) : []);
                
                if (currentEventCorps.length === 0) {
                    alert('No corps assigned to this event');
                    return;
                }
                
                // Load existing scores
                const { data: existingScores } = await supabaseClient
                    .from('event_scores')
                    .select('*')
                    .eq('event_id', eventId);
                
                const scoresMap = {};
                if (existingScores) {
                    filterWorldClassScoreRows(existingScores, 'corps_name').forEach(score => {
                        scoresMap[score.corps_name] = score;
                    });
                }
                
                // Build score entry form
                const content = document.getElementById('scoreEntryContent');
                content.innerHTML = `
                    <h3 style="text-align: center; margin-bottom: 2rem;">${eventName}</h3>
                    <div class="score-grid">
                        ${currentEventCorps.map(corps => `
                            <div class="corps-score-section">
                                <h4 class="corps-score-title">${corps}</h4>
                                <div class="score-inputs">
                                    <div class="score-input-group">
                                        <label>Brass</label>
                                        <input type="number" id="brass_${corps.replace(/\s+/g, '_')}" 
                                               value="${scoresMap[corps]?.brass_score || ''}" 
                                               min="0" max="20" step="0.001" placeholder="0.000">
                                    </div>
                                    <div class="score-input-group">
                                        <label>Percussion</label>
                                        <input type="number" id="percussion_${corps.replace(/\s+/g, '_')}" 
                                               value="${scoresMap[corps]?.percussion_score || ''}" 
                                               min="0" max="20" step="0.001" placeholder="0.000">
                                    </div>
                                    <div class="score-input-group">
                                        <label>Color Guard</label>
                                        <input type="number" id="guard_${corps.replace(/\s+/g, '_')}" 
                                               value="${scoresMap[corps]?.color_guard_score || ''}" 
                                               min="0" max="20" step="0.001" placeholder="0.000">
                                    </div>
                                    <div class="score-input-group">
                                        <label>General Effect</label>
                                        <input type="number" id="ge_${corps.replace(/\s+/g, '_')}" 
                                               value="${scoresMap[corps]?.general_effect_score || ''}" 
                                               min="0" max="40" step="0.001" placeholder="0.000">
                                    </div>
                                    <div class="score-input-group">
                                        <label>Visual</label>
                                        <input type="number" id="visual_${corps.replace(/\s+/g, '_')}" 
                                               value="${scoresMap[corps]?.visual_score || ''}" 
                                               min="0" max="30" step="0.001" placeholder="0.000">
                                    </div>
                                    <div class="score-input-group">
                                        <label>Music</label>
                                        <input type="number" id="music_${corps.replace(/\s+/g, '_')}" 
                                               value="${scoresMap[corps]?.music_score || ''}" 
                                               min="0" max="30" step="0.001" placeholder="0.000">
                                    </div>
								    <div class="score-input-group">
          <label>Total Score</label>
          <input type="number" id="total_${corps.replace(/\s+/g, '_')}"
                 value="" 
                 min="0" max="100" step="0.001" placeholder="0.000">
        </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                content.innerHTML += `
  <div class="corps-score-section" style="margin-top: 2rem;">
  <div style="margin-top: 2rem;">
  <h4>Paste Scores JSON</h4>
  <textarea id="pasteScoresJson" rows="8" style="width:100%;"></textarea>
  <button class="btn" onclick="pasteScoresIntoFields()">Fill Scores From JSON</button>
</div>
    <h4 class="corps-score-title">Caption Winners</h4>
    <div class="score-inputs">
      <div class="score-input-group">
        <label>Brass Winner</label>
        <select id="brass_winner">
          <option value="">Select Corps</option>
          ${currentEventCorps.map(corps => `<option value="${corps}">${corps}</option>`).join('')}
        </select>
      </div>
      <div class="score-input-group">
        <label>Percussion Winner</label>
        <select id="percussion_winner">
          <option value="">Select Corps</option>
          ${currentEventCorps.map(corps => `<option value="${corps}">${corps}</option>`).join('')}
        </select>
      </div>
      <div class="score-input-group">
        <label>Color Guard Winner</label>
        <select id="guard_winner">
          <option value="">Select Corps</option>
          ${currentEventCorps.map(corps => `<option value="${corps}">${corps}</option>`).join('')}
        </select>
      </div>
    </div>
  </div>
`;

                document.getElementById('scoreModal').style.display = 'block';
            } catch (error) {
                console.error('Error in editScores:', error);
                alert('Error opening score editor: ' + error.message);
            }
        }

        // Close score modal
        function closeScoreModal() {
            document.getElementById('scoreModal').style.display = 'none';
            currentEventId = null;
            currentEventCorps = [];
        }

// Save scores
async function saveScores() {
  if (!currentEventId || currentEventCorps.length === 0) return;

  const scores = [];

  for (const corps of currentEventCorps) {
    const corpsId = corps.replace(/\s+/g, '_');
    const brass = parseFloat(document.getElementById(`brass_${corpsId}`).value) || 0;
    const percussion = parseFloat(document.getElementById(`percussion_${corpsId}`).value) || 0;
    const guard = parseFloat(document.getElementById(`guard_${corpsId}`).value) || 0;
    const ge = parseFloat(document.getElementById(`ge_${corpsId}`).value) || 0;
    const visual = parseFloat(document.getElementById(`visual_${corpsId}`).value) || 0;
    const music = parseFloat(document.getElementById(`music_${corpsId}`).value) || 0;

    // Round to 3 decimals (DCI caption scores carry at most 3) so the stored total
    // doesn't persist a floating-point artifact like 97.30000000000001.
    // Total is GE + Visual + Music only (the three major captions). Guard is
    // already folded into Visual, and Brass + Percussion into Music, so adding
    // them again would double-count (e.g. 77.55 -> 124.45).
    const total = Math.round((ge + visual + music) * 1000) / 1000;

    scores.push({
      event_id: currentEventId,
      corps_name: corps,
      brass_score: brass,
      percussion_score: percussion,
      color_guard_score: guard,
      general_effect_score: ge,
      visual_score: visual,
      music_score: music,
      total_score: total
    });
  }

  const finalScoresJson = [];
  for (const corps of currentEventCorps) {
    const corpsId = corps.replace(/\s+/g, '_');
    const totalScore = parseFloat(document.getElementById(`total_${corpsId}`).value) || 0;

    finalScoresJson.push({
      corps_name: corps,
      score: totalScore
    });
  }
  finalScoresJson.sort((a, b) => b.score - a.score);
  finalScoresJson.forEach((c, idx) => {
    c.placement = idx + 1;
  });

  const brassWinner = document.getElementById('brass_winner').value;
  const percussionWinner = document.getElementById('percussion_winner').value;
  const guardWinner = document.getElementById('guard_winner').value;

  // Delete existing scores
  const { error: deleteError } = await supabaseClient
    .from('event_scores')
    .delete()
    .eq('event_id', currentEventId);

  if (deleteError) {
    alert('Error saving scores: ' + deleteError.message);
    return;
  }

  // Insert new scores
  const { error: insertError } = await supabaseClient
    .from('event_scores')
    .insert(scores);

  if (insertError) {
    alert('Error saving scores: ' + insertError.message);
    return;
  }

  // mark event completed
  const allScoresEntered = scores.every(s => s.total_score > 0);
  if (allScoresEntered) {
    const { error: updateError } = await supabaseClient
      .from('events')
      .update({
        is_completed: allScoresEntered,
        caption_winners: {
          brass: brassWinner,
          percussion: percussionWinner,
          color_guard: guardWinner
        },
        final_scores: finalScoresJson
      })
      .eq('id', currentEventId);

    if (updateError) {
      alert('Error marking event complete: ' + updateError.message);
      return;
    }

    // small delay to ensure commit
    await new Promise(resolve => setTimeout(resolve, 500));

    // then trigger scoring RPC
    const { data: scoringResult, error: scoringError } = await supabaseClient
      .rpc('score_event_predictions', { p_event_id: currentEventId });

    if (scoringError) {
      console.error('Error scoring predictions:', scoringError);
      alert('Error running prediction scoring: ' + scoringError.message);
    } else {
      console.log('Predictions scored successfully:', scoringResult);
    }
  }

  alert('Scores saved successfully!');
  closeScoreModal();
  loadEvents();
}


        // Show message

// Close modal
function closeDateTimeModal() {
    document.getElementById('dateTimeModal').style.display = 'none';
    currentEditEventId = null;
}

// Submit form
document.getElementById('dateTimeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentEditEventId) return;

    const newDate = document.getElementById('newEventDate').value;
    const newTime = document.getElementById('newEventTime').value;

    // First, fetch the event to get the location
    const { data: event, error: loadError } = await supabaseClient
        .from('events')
        .select('*')
        .eq('id', currentEditEventId)
        .single();

    if (loadError || !event) {
        showDateTimeMessage('Error loading event location', 'error');
        return;
    }

    // get timezone from location
    const timezoneMap = {
        'CA': 'America/Los_Angeles',
        'OR': 'America/Los_Angeles',
        'WA': 'America/Los_Angeles',
        'NV': 'America/Los_Angeles',
        'ID': 'America/Boise',
        'MT': 'America/Denver',
        'UT': 'America/Denver',
        'CO': 'America/Denver',
        'AZ': 'America/Phoenix',
        'NM': 'America/Denver',
        'TX': 'America/Chicago',
        'OK': 'America/Chicago',
        'KS': 'America/Chicago',
        'NE': 'America/Chicago',
        'SD': 'America/Chicago',
        'ND': 'America/Chicago',
        'MN': 'America/Chicago',
        'IA': 'America/Chicago',
        'MO': 'America/Chicago',
        'WI': 'America/Chicago',
        'IL': 'America/Chicago',
        'IN': 'America/Indiana/Indianapolis',
        'MI': 'America/Detroit',
        'OH': 'America/New_York',
        'PA': 'America/New_York',
        'NY': 'America/New_York',
        'NJ': 'America/New_York',
        'CT': 'America/New_York',
        'MA': 'America/New_York',
        'RI': 'America/New_York',
        'VT': 'America/New_York',
        'NH': 'America/New_York',
        'ME': 'America/New_York',
        'FL': 'America/New_York',
        'GA': 'America/New_York',
        'SC': 'America/New_York',
        'NC': 'America/New_York',
        'VA': 'America/New_York',
        'MD': 'America/New_York',
        'DC': 'America/New_York',
        'KY': 'America/New_York',
        'TN': 'America/Chicago',
        'AL': 'America/Chicago',
        'MS': 'America/Chicago',
        'LA': 'America/Chicago',
        'AR': 'America/Chicago'
    };

    let tz = 'America/Chicago'; // default
    if (event.location) {
        const parts = event.location.split(',');
        const stateAbbr = parts[parts.length - 1].trim().toUpperCase();
        tz = timezoneMap[stateAbbr] || 'America/Chicago';
    }

    // now update with timezone
    const { error: updateError } = await supabaseClient
        .from('events')
        .update({
            date: newDate,
            time: newTime,
            timezone: tz
        })
        .eq('id', currentEditEventId);

    if (updateError) {
        showDateTimeMessage('Error updating event: ' + updateError.message, 'error');
        return;
    }

    showDateTimeMessage('Event date/time updated!', 'success');
    setTimeout(() => {
        closeDateTimeModal();
        loadEvents();
    }, 1000);
});

// showDateTimeMessage helper
function showDateTimeMessage(text, type) {
    const el = document.getElementById('dateTimeMessage');
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = 'block';
    setTimeout(() => {
        el.style.display = 'none';
    }, 3000);
}
function pasteScoresIntoFields() {
  try {
    const raw = document.getElementById('pasteScoresJson').value;
    const data = JSON.parse(raw);

    filterWorldClassScoreRows(data, 'corps').forEach(item => {
      const id = item.corps.replace(/\s+/g, '_');
      const brass = document.getElementById(`brass_${id}`);
      if (!brass) return;
      brass.value = item.brassScore;
      document.getElementById(`percussion_${id}`).value = item.percussionScore;
      document.getElementById(`guard_${id}`).value = item.guardScore;
      document.getElementById(`ge_${id}`).value = item.geScore;
      document.getElementById(`visual_${id}`).value = item.visScore;
      document.getElementById(`music_${id}`).value = item.musicScore;
      document.getElementById(`total_${id}`).value = item.totalScore;
    });

    alert("Scores pasted successfully!");
  } catch (err) {
    alert("Error parsing JSON, please check syntax.");
    console.error(err);
  }
}
