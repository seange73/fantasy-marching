<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Fantasy Marching</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
        .auth-card { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 2.25rem; width: 100%; max-width: 400px; }
        .logo-section { text-align: center; margin-bottom: 1.75rem; }
        .logo-section img { height: 34px; }
        .card-title { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-top: 1rem; }
        .card-sub { color: var(--text-2); font-size: 0.85rem; margin-top: 0.3rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: var(--text); font-size: 0.8rem; }
        .form-input { width: 100%; padding: 0.65rem 0.875rem; background: var(--s2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; font-family: var(--body); outline: none; transition: border-color 0.1s; }
        .form-input::placeholder { color: var(--text-3); }
        .form-input:focus { border-color: var(--teal); }
        .password-container { position: relative; }
        .password-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
        .password-toggle:hover { color: var(--teal); }
        .eye-icon { width: 18px; height: 18px; fill: currentColor; }
        .auth-button { width: 100%; background: var(--teal); color: var(--bg); border: none; border-radius: 6px; padding: 0.75rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: var(--body); margin-top: 0.4rem; }
        .auth-button:hover { opacity: 0.9; }
        .auth-button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.82rem; display: none; }
        .msg.error { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; }
        .msg.success { background: var(--teal-bg); border: 1px solid var(--teal-dim); color: var(--teal); }
        .center-link { text-align: center; margin-top: 1.25rem; }
        .center-link a { color: var(--teal); text-decoration: none; font-size: 0.82rem; }
        .center-link a:hover { text-decoration: underline; }
        .state { display: none; }
        .state.active { display: block; }
        .loading-state { text-align: center; color: var(--text-2); font-size: 0.85rem; padding: 1rem 0; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-section">
            <img src="/images/logo.png" alt="Fantasy Marching">
            <div class="card-title" id="cardTitle">Reset your password</div>
            <div class="card-sub" id="cardSub">Choose a new password for your account.</div>
        </div>

        <div id="msg" class="msg"></div>

        <!-- Loading / validating the recovery link -->
        <div id="loadingState" class="state active">
            <div class="loading-state">Checking your reset link…</div>
        </div>

        <!-- New password form -->
        <div id="formState" class="state">
            <form onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label" for="newPassword">New password</label>
                    <div class="password-container">
                        <input type="password" id="newPassword" class="form-input" placeholder="At least 6 characters" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                            <svg class="eye-icon" viewBox="0 0 24 24"><path id="newPasswordEye" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmNewPassword">Confirm new password</label>
                    <div class="password-container">
                        <input type="password" id="confirmNewPassword" class="form-input" placeholder="Re-enter your new password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword')">
                            <svg class="eye-icon" viewBox="0 0 24 24"><path id="confirmNewPasswordEye" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-button" id="resetButton">Update password</button>
            </form>
        </div>

        <!-- Invalid / expired link -->
        <div id="invalidState" class="state">
            <div class="loading-state">This reset link is invalid or has expired.</div>
            <div class="center-link"><a href="/login.html">Back to login to request a new one</a></div>
        </div>
    </div>

    <!-- Minimal Supabase client only (we don't want the app modules / messenger on this page).
         detectSessionInUrl picks up the recovery token from the link's hash. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vonqrnoiroixdlgndofw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvbnFybm9pcm9peGRsZ25kb2Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0MDIyOTcsImV4cCI6MjA2Mzk3ODI5N30.vGk9soB66Rs6Kt8fC8oHPYfZYu9Og8zndIiuIV2ZIYM';
        // We parse the recovery token from the hash ourselves (detectSessionInUrl can
        // consume the hash without leaving a usable session), and don't persist it.
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { detectSessionInUrl: false }
        });

        function show(stateId) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            document.getElementById(stateId).classList.add('active');
        }
        function showMsg(text, type) {
            const m = document.getElementById('msg');
            m.textContent = text; m.className = 'msg ' + type; m.style.display = 'block';
        }
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const eyePath = document.getElementById(inputId + 'Eye');
            if (input.type === 'password') {
                input.type = 'text';
                eyePath.setAttribute('d', 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21');
            } else {
                input.type = 'password';
                eyePath.setAttribute('d', 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z');
            }
        }

        // The recovery link carries the session tokens in the URL hash. Parse them and
        // establish the (temporary) session so updateUser can change the password.
        (async () => {
            try {
                const params = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
                const access_token = params.get('access_token');
                const refresh_token = params.get('refresh_token');
                if (access_token && refresh_token) {
                    const { data, error } = await supabaseClient.auth.setSession({ access_token, refresh_token });
                    if (!error && data && data.session) {
                        // Clear the tokens from the address bar.
                        history.replaceState(null, '', window.location.pathname);
                        show('formState');
                        return;
                    }
                }
                show('invalidState');
            } catch (e) {
                show('invalidState');
            }
        })();

        async function handleReset(event) {
            event.preventDefault();
            const pw = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            const btn = document.getElementById('resetButton');
            document.getElementById('msg').style.display = 'none';
            if (pw !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
            if (pw.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
            btn.disabled = true; btn.textContent = 'Updating…';
            try {
                const { error } = await supabaseClient.auth.updateUser({ password: pw });
                if (error) throw error;
                showMsg('Password updated! Taking you to the app…', 'success');
                document.getElementById('formState').classList.remove('active');
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
            } catch (e) {
                showMsg(e.message || 'Could not update password. The link may have expired.', 'error');
                btn.disabled = false; btn.textContent = 'Update password';
            }
        }
    </script>
</body>
</html>
