<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <!-- Root router. Loading supabase.js also processes any auth tokens in the URL
         hash (email confirmation / password flows) before we decide where to go. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        (async () => {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                // Browse-first will send signed-out visitors to the dashboard once it is
                // a public home (Stage 2); for now the login page is the entry point.
                window.location.replace(user ? '/dashboard.html' : ('/login.html' + (location.hash || '')));
            } catch (e) {
                window.location.replace('/login.html');
            }
        })();
    </script>
</head>
<body></body>
</html>
