<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching - Join the Competition</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
        .auth-container {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .logo-section { text-align: center; margin-bottom: 2rem; }
        .logo { font-size: 1.4rem; font-weight: 700; color: var(--teal); margin-bottom: 0.4rem; }
        .tagline { color: var(--text-2); font-size: 0.82rem; }
        .auth-tabs {
            display: flex;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px;
            margin-bottom: 1.5rem;
            gap: 3px;
        }
        .tab-button {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem;
            border-radius: 3px;
            cursor: pointer;
            font-family: var(--body);
            transition: color 0.1s, background 0.1s;
        }
        .tab-button:hover { color: var(--text); }
        .tab-button.active { background: var(--s3); color: var(--text); }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: var(--text); font-size: 0.8rem; }
        .form-input {
            width: 100%;
            padding: 0.65rem 0.875rem;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: var(--body);
            outline: none;
            transition: border-color 0.1s;
        }
        .form-input::placeholder { color: var(--text-3); }
        .form-input:focus { border-color: var(--teal); }
        .password-container { position: relative; }
        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        .password-toggle:hover { color: var(--teal); }
        .eye-icon { width: 18px; height: 18px; fill: currentColor; }
        .auth-button {
            width: 100%;
            background: var(--teal);
            color: var(--bg);
            border: none;
            border-radius: 4px;
            padding: 0.75rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--body);
            margin-bottom: 1.25rem;
        }
        .auth-button:hover { opacity: 0.9; }
        .auth-button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message {
            background: rgba(255,107,107,0.08);
            border: 1px solid rgba(255,107,107,0.3);
            color: #ff6b6b;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.82rem;
            display: none;
        }
        .success-message {
            background: var(--teal-bg);
            border: 1px solid var(--teal-dim);
            color: var(--teal);
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.82rem;
            display: none;
        }
        @media (max-width: 480px) { .auth-container { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-section">
            <div class="logo">Fantasy Marching</div>
            <div class="tagline">Compete. Predict. Dominate.</div>
        </div>

        <div class="auth-tabs">
            <button class="tab-button active" onclick="switchTab('login')">Login</button>
            <button class="tab-button" onclick="switchTab('register')">Register</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <div class="password-container">
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path id="loginPasswordEye" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-button" id="loginButton">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form" style="display: none;">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" class="form-input" placeholder="Choose a username" required minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerPassword">Password</label>
                    <div class="password-container">
                        <input type="password" id="registerPassword" class="form-input" placeholder="Create a strong password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path id="registerPasswordEye" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path id="confirmPasswordEye" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-button" id="registerButton">
                    Create Account
                </button>
            </form>
        </div>


    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Your Supabase configuration -->
    <script src="js/supabase.js"></script>
    
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-button');

            // Clear any messages
            hideMessages();

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const eyePath = document.getElementById(inputId + 'Eye');
            
            if (input.type === 'password') {
                input.type = 'text';
                // Closed eye (crossed out)
                eyePath.setAttribute('d', 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21');
            } else {
                input.type = 'password';
                // Open eye
                eyePath.setAttribute('d', 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function setLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            button.disabled = isLoading;
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            setLoading('loginButton', true);
            hideMessages();

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                showSuccess('Welcome back! Redirecting...');
                
                // Redirect to dashboard after successful login
                setTimeout(() => {
                    if (window.location.protocol === 'file:') {
                        // For local file system
                        const currentPath = window.location.pathname;
                        const directory = currentPath.substring(0, currentPath.lastIndexOf('/'));
                        window.location.href = 'file://' + directory + '/dashboard.html';
                    } else {
                        // For web server
                        window.location.href = '/dashboard.html';
                    }
                }, 1500);

            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
            } finally {
                setLoading('loginButton', false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            hideMessages();

            // Validation
            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }

            setLoading('registerButton', true);

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });

                if (error) throw error;

                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    showError('This email is already registered. Please login instead.');
                } else {
                    showSuccess('Account created! Please check your email to verify your account.');
                    
                    // Switch to login tab after successful registration
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginEmail').value = email;
                    }, 3000);
                }

            } catch (error) {
                showError(error.message || 'Registration failed. Please try again.');
            } finally {
                setLoading('registerButton', false);
            }
        }


        async function forgotPassword() {
            const email = document.getElementById('loginEmail').value;
            
            if (!email) {
                showError('Please enter your email address first.');
                return;
            }

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html',
                });
                
                if (error) throw error;
                
                showSuccess('Password reset instructions sent to your email!');
            } catch (error) {
                showError('Failed to send reset email. Please try again.');
            }
        }
    </script>
</body>
</html>
