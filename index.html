<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <!-- Browse-first: the root always lands on the dashboard (the public home).
         Any auth tokens in the URL hash (email confirmation / password flows) are
         forwarded so the dashboard's Supabase client can process them. -->
    <script>
        // Password-recovery links may land here (when the redirect falls back to the
        // Site URL); send those to the reset screen instead of the dashboard.
        (function () {
            var h = location.hash || '';
            if (h.indexOf('type=recovery') !== -1) { location.replace('/reset-password.html' + h); return; }
            location.replace('/dashboard.html' + (location.search || '') + h);
        })();
    </script>
</head>
<body></body>
</html>
