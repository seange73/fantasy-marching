<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 50%, #6c5ce7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 1.5rem;
            color: #a0a0a0;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .coming-soon {
            font-size: 2rem;
            font-weight: 700;
            color: #4ecdc4;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .description {
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .launch-date {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            display: inline-block;
        }

        .launch-date p {
            font-size: 1rem;
            color: #a0a0a0;
            margin-bottom: 0.5rem;
        }

        .date {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .music-note {
            font-size: 3rem;
            animation: bounce 2s ease-in-out infinite;
            margin: 2rem 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fantasy Marching</h1>
        <p class="tagline">Compete. Predict. Dominate.</p>
        
        <div class="music-note">🎺</div>
        
        <p class="coming-soon">Coming Soon</p>
        
        <p class="description">
            Get ready for the ultimate drum corps fantasy experience. 
            Make predictions, compete with friends, and prove your expertise 
            in the marching arts.
        </p>
        
        <div class="launch-date">
            <p>Expected Launch</p>
            <p class="date">Summer 2025</p>
        </div>
    </div>
</body>
</html>
