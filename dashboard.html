<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching - Dashboard</title>
	<link rel="icon" href="/images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Styles */
        .header {
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 75px;
            width: auto;
            display: block;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 2rem;
            flex: 1;
            justify-content: center;
        }

        .nav-tab {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab.active {
            color: #4ecdc4;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            border-radius: 2px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            position: relative;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        /* Profile Dropdown */
        .profile-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .dropdown-item.admin {
            color: #4ecdc4;
        }

        .dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
        }

        .dropdown-icon {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* Reminder Cards */
        .reminders-section {
            grid-column: 1 / -1;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .reminders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .reminder-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .reminder-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(78, 205, 196, 0.3);
        }

        .reminder-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .reminder-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .reminder-text {
            color: #a0a0a0;
            font-size: 0.95rem;
            line-height: 1.5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .reminder-action {
            color: #4ecdc4;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Leaderboard Styles */
        .leaderboard-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            height: fit-content;
        }

        .leaderboard-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #4ecdc4;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .title-icon {
            font-size: 1.6rem;
            filter: saturate(0.8) hue-rotate(180deg) brightness(1.2);
        }

        .leaderboard-entry {
            display: flex;
            align-items: center;
            padding: 0.875rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .leaderboard-entry:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .rank {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-right: 1rem;
            font-size: 0.9rem;
        }

        .rank-1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
        }

        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            color: #000;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd7f32 0%, #e8a857 100%);
            color: #000;
        }

        .rank-default {
            background: rgba(255, 255, 255, 0.1);
            color: #a0a0a0;
        }

        .player-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .player-name {
            font-weight: 600;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .player-score {
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .view-more {
            text-align: center;
            margin-top: 1rem;
        }

        .view-more-btn {
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .view-more-btn:hover {
            color: #45b7d1;
        }

        /* League Section */
        .leagues-section {
            grid-column: 1 / -1;
            margin-top: 2rem;
        }

        .leagues-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }

        .leagues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .no-leagues {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            padding: 3rem;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .no-leagues a {
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 600;
        }

        .no-leagues a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .header-content {
                padding: 1rem;
            }

            .user-name {
                display: none;
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            color: #666;
            padding: 2rem;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            height: 60px;
            margin-bottom: 0.5rem;
        }
        /* Leaderboard Toggle Buttons */
        .leaderboard-toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #a0a0a0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .leaderboard-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .leaderboard-toggle-btn.active {
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            color: white;
            border-color: transparent;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

    <script>
        let currentUser = null;
        let isAdmin = false;

        // Initialize dashboard
        async function initDashboard() {
            // Check authentication
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            currentUser = user;
            
            // Load user profile and check admin status
            await loadUserProfile();
            
            // Load all dashboard data
            loadReminders();
            loadPredictionsLeaderboard();
            loadLeagueLeaderboard();
            loadUserLeagues();
        }
        // Load user profile
        async function loadUserProfile() {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('username, avatar_url, is_admin')
                .eq('id', currentUser.id)
                .single();
            
            if (profile) {
                document.getElementById('userName').textContent = profile.username || currentUser.email.split('@')[0];
                
                // Set avatar (initial letter for now)
                const initial = (profile.username || currentUser.email)[0].toUpperCase();
                document.getElementById('userAvatar').textContent = initial;
                
                // Check admin status
                isAdmin = profile.is_admin || false;
                if (isAdmin) {
                    document.getElementById('adminLink').style.display = 'flex';
                    document.getElementById('adminDivider').style.display = 'block';
                }
            }
        }
// Simple notification function for dashboard
function showNotification(title, message, type = 'info') {
    // Create notification element
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${type === 'success' ? 'rgba(78, 205, 196, 0.1)' : type === 'error' ? 'rgba(255, 107, 107, 0.1)' : 'rgba(69, 183, 209, 0.1)'};
        border: 1px solid ${type === 'success' ? 'rgba(78, 205, 196, 0.3)' : type === 'error' ? 'rgba(255, 107, 107, 0.3)' : 'rgba(69, 183, 209, 0.3)'};
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        min-width: 300px;
        animation: slideIn 0.3s ease-out;
    `;
    
    notification.innerHTML = `
        <div style="font-weight: 700; margin-bottom: 0.25rem;">${title}</div>
        <div style="font-size: 0.9rem; color: #e0e0e0;">${message}</div>
    `;
    
    document.body.appendChild(notification);
    
    // Auto remove after 3 seconds
    setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease-out';
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// Add the animations
const style = document.createElement('style');
style.textContent = `
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
    }
`;
document.head.appendChild(style);
        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Function to get all user predictions (for stats)
        async function getAllUserPredictions() {
            try {
                const { data, error } = await supabaseClient
                    .from('predictions')
                    .select(`
                        *,
                        events!inner(
                            name,
                            date,
                            location,
                            is_completed,
                            final_scores
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error loading all predictions:', error);
                    return [];
                }

                return data;
            } catch (error) {
                console.error('Unexpected error:', error);
                return [];
            }
        }
function handleJoinRequestFromElement(element) {
    const requestId = element.getAttribute('data-request-id');
    const leagueId = element.getAttribute('data-league-id');
    const userId = element.getAttribute('data-user-id');
    const username = element.getAttribute('data-username');
    const leagueName = element.getAttribute('data-league-name');
    
    handleJoinRequest(requestId, leagueId, userId, username, leagueName);
}

        // Load user's leagues
async function loadUserLeagues() {
    const { data: userLeagues, error } = await supabaseClient
        .from('league_members')
        .select(`
            league_id,
            role,
            leagues (
                id,
                name,
                is_global
            )
        `)
        .eq('user_id', currentUser.id)
        .eq('status', 'active');
    
    if (error) {
        console.error('Error loading user leagues:', error);
        return;
    }
    
    const grid = document.getElementById('leaguesGrid');
    
    // Check if user has no leagues
    if (!userLeagues || userLeagues.length === 0) {
        grid.innerHTML = `
            <div class="no-leagues">
                You are currently in no leagues. <a href="/league.html">Join a league in the league tab!</a>
            </div>
        `;
        return;
    }
    
    // Get real stats for each league
    const leagueCards = await Promise.all(userLeagues.map(async (item) => {
        const league = item.leagues;
        
        // Check if draft has happened
        const { data: draftData } = await supabaseClient
            .from('league_drafts')
            .select('status')
            .eq('league_id', league.id)
            .maybeSingle();
        
        if (!draftData || draftData.status !== 'completed') {
            // Pre-draft league
            return `
                <div class="leaderboard-card">
                    <h3 class="leaderboard-title">${league.name}</h3>
                    <div style="text-align: center; padding: 2rem; color: #666;">
                        <p>Draft not started</p>
                        ${item.role === 'owner' ? '<p style="margin-top: 0.5rem; color: #ffd700;">You are the owner</p>' : ''}
                    </div>
                    <div class="view-more">
                        <a href="/league-detail.html?id=${league.id}" class="view-more-btn">View League →</a>
                    </div>
                </div>
            `;
        }
        
        // Get user's team
        const { data: team } = await supabaseClient
            .from('league_teams')
            .select('id')
            .eq('league_id', league.id)
            .eq('user_id', currentUser.id)
            .maybeSingle();
        
        if (!team) {
            return ''; // Skip if no team found
        }
        
        // Get all teams for ranking
        const { data: allTeams } = await supabaseClient
            .from('league_teams')
            .select('id, user_id')
            .eq('league_id', league.id);
        
        // Get matchups for stats
        const { data: matchups } = await supabaseClient
            .from('league_matchups')
            .select('*')
            .eq('league_id', league.id)
            .or(`team1_id.eq.${team.id},team2_id.eq.${team.id}`);
        
        // Calculate stats
        let wins = 0, losses = 0, totalScore = 0, gamesPlayed = 0;
        
        if (matchups) {
            matchups.forEach(matchup => {
                if (matchup.winner_id) {
                    gamesPlayed++;
                    if (matchup.winner_id === team.id) {
                        wins++;
                    } else {
                        losses++;
                    }
                    
                    if (matchup.team1_id === team.id) {
                        totalScore += matchup.team1_score || 0;
                    } else {
                        totalScore += matchup.team2_score || 0;
                    }
                }
            });
        }
        
        // Calculate rank
        const { data: allMatchups } = await supabaseClient
            .from('league_matchups')
            .select('*')
            .eq('league_id', league.id)
            .not('winner_id', 'is', null);
        
        const teamRecords = [];
        if (allTeams) {
            allTeams.forEach(t => {
                let teamWins = 0;
                let teamTotal = 0;
                let teamGames = 0;
                
                allMatchups?.forEach(m => {
                    if (m.team1_id === t.id || m.team2_id === t.id) {
                        teamGames++;
                        if (m.winner_id === t.id) teamWins++;
                        if (m.team1_id === t.id) {
                            teamTotal += m.team1_score || 0;
                        } else {
                            teamTotal += m.team2_score || 0;
                        }
                    }
                });
                
                teamRecords.push({
                    id: t.id,
                    user_id: t.user_id,
                    wins: teamWins,
                    winPct: teamGames > 0 ? teamWins / teamGames : 0,
                    avgScore: teamGames > 0 ? teamTotal / teamGames : 0
                });
            });
        }
        
        // Sort by win percentage, then by average score
        teamRecords.sort((a, b) => {
            if (b.winPct !== a.winPct) return b.winPct - a.winPct;
            return b.avgScore - a.avgScore;
        });
        
        const rank = teamRecords.findIndex(t => t.id === team.id) + 1;
        const totalTeams = allTeams ? allTeams.length : 0;
        const avgScore = gamesPlayed > 0 ? (totalScore / gamesPlayed).toFixed(1) : '0.0';
        
        // Get top player info if not the owner
        let leaderInfo = '';
        if (item.role !== 'owner' && teamRecords.length > 0 && teamRecords[0].id !== team.id) {
            // Get the leader's username
            const { data: leaderProfile } = await supabaseClient
                .from('profiles')
                .select('username')
                .eq('id', teamRecords[0].user_id)
                .maybeSingle();
            
            const leaderName = leaderProfile?.username || 'Unknown';
            const leaderScore = teamRecords[0].avgScore.toFixed(1);
            leaderInfo = `Leader: ${leaderName} (${leaderScore} pts)`;
        }
        
        return `
            <div class="leaderboard-card">
                <h3 class="leaderboard-title">${league.name}</h3>
                <div class="leaderboard-entry" style="background: rgba(78, 205, 196, 0.1);">
                    <div class="rank ${rank <= 3 ? `rank-${rank}` : 'rank-default'}">${rank}</div>
                    <div class="player-info">
                        <span class="player-name">Your Position</span>
                    </div>
                    <span class="player-score">${rank}/${totalTeams}</span>
                </div>
                <div style="margin: 1rem 0; text-align: center; color: #666; font-size: 0.9rem;">
                    Record: ${wins}-${losses} • Avg Score: ${avgScore}
                    <br>${item.role === 'owner' ? 'You are the owner' : leaderInfo}
                </div>
                <div class="view-more">
                    <a href="/league-detail.html?id=${league.id}" class="view-more-btn">View League →</a>
                </div>
            </div>
        `;
    }));
    
    grid.innerHTML = leagueCards.filter(card => card).join('');
}

    </script>

    <script>
    // Join request handling
    let currentRequestId = null;
    let currentRequestLeagueId = null;
    let currentRequestUserId = null;
	let currentRequestUsername = null; // Add this line
	let leaderboardMode = 'score';
	let leagueLeaderboardMode = 'total';
	
    function handleJoinRequest(requestId, leagueId, userId, username, leagueName) {
        currentRequestId = requestId;
        currentRequestLeagueId = leagueId;
        currentRequestUserId = userId;
        
        document.getElementById('requestDetails').innerHTML = `
            <p style="color: #e0e0e0; font-size: 1.1rem; margin-bottom: 1rem;">
                <strong>${username}</strong> wants to join your league:
            </p>
            <p style="
                color: #4ecdc4;
                font-size: 1.3rem;
                font-weight: 700;
                text-align: center;
                padding: 1rem;
                background: rgba(78, 205, 196, 0.1);
                border-radius: 12px;
                margin-bottom: 1rem;
            ">${leagueName}</p>
            <p style="color: #a0a0a0; font-size: 0.9rem;">
                Approving this request will add them to your league immediately.
            </p>
        `;
        
        document.getElementById('joinRequestModal').style.display = 'flex';
    }

    function closeJoinRequestModal() {
        document.getElementById('joinRequestModal').style.display = 'none';
        currentRequestId = null;
        currentRequestLeagueId = null;
        currentRequestUserId = null;
		currentRequestUsername = null; 
    }

    async function approveJoinRequest() {
        if (!currentRequestId) return;
        
        try {
            // Update request status
            const { error: updateError } = await supabaseClient
                .from('league_join_requests')
                .update({ status: 'approved' })
                .eq('id', currentRequestId);
            
            if (updateError) throw updateError;
            
            // Add user to league
            const { error: memberError } = await supabaseClient
                .from('league_members')
                .insert({
                    league_id: currentRequestLeagueId,
                    user_id: currentRequestUserId,
                    role: 'member',
                    status: 'active'
                });
            
            if (memberError) {
                // If already a member, just update the request
                console.log('User might already be a member');
            }
            
            showNotification('Request Approved', 'The user has been added to your league!', 'success');
            closeJoinRequestModal();
            loadReminders(); // Refresh reminders
            
        } catch (error) {
            console.error('Error approving request:', error);
            showNotification('Error', 'Failed to process request: ' + error.message, 'error');
        }
    }

    async function rejectJoinRequest() {
        if (!currentRequestId) return;
        
        try {
            const { error } = await supabaseClient
                .from('league_join_requests')
                .update({ status: 'rejected' })
                .eq('id', currentRequestId);
            
            if (error) throw error;
            
			showNotification('Request Denied', `Request Rejected`, 'success');

            closeJoinRequestModal();
            loadReminders(); // Refresh reminders
            
        } catch (error) {
            console.error('Error rejecting request:', error);
            showNotification('Error', 'Failed to process request: ' + error.message, 'error');
        }
    }
    </script>
