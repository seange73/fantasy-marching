<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching - Dashboard</title>
	<link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        /* ── MAIN LAYOUT ── */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.75rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .full-width        { grid-column: 1 / -1; }
        .reminders-section { grid-column: 1 / -1; }
        .leagues-section   { grid-column: 1 / -1; }

        /* ── SECTION TITLES ── */
        .section-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        /* ── CARDS ── */
        .leaderboard-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            height: fit-content;
        }

        .leaderboard-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.01em;
            padding: 0.8rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-transform: none;
        }

        .title-icon { font-size: 1rem; }

        /* ── LEADERBOARD ENTRIES ── */
        .leaderboard-entry {
            display: flex;
            align-items: center;
            padding: 0.65rem 1.25rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        .leaderboard-entry:last-of-type { border-bottom: none; }
        .leaderboard-entry:hover { background: var(--s2); }

        .rank {
            width: 2rem;
            text-align: center;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-3);
            margin-right: 0.75rem;
            flex-shrink: 0;
            border-radius: 0;
            background: transparent;
            height: auto;
        }

        .rank-1 { color: var(--teal); }
        .rank-2 { color: var(--text-2); }
        .rank-3 { color: var(--text-2); }
        .rank-default { color: var(--text-3); }

        .player-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .player-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--s3);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-2);
            flex-shrink: 0;
            overflow: hidden;
        }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .player-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
        }

        .player-score {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--text);
        }

        /* ── TOGGLE BUTTONS ── */
        .leaderboard-toggle-btn {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border);
            padding: 0.28rem 0.7rem;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.1s, background 0.1s, border-color 0.1s;
            font-family: var(--body);
        }

        .leaderboard-toggle-btn:hover { background: var(--s3); color: var(--text); }

        .leaderboard-toggle-btn.active {
            background: var(--teal-bg);
            color: var(--teal);
            border-color: var(--teal-dim);
        }

        /* ── VIEW MORE ── */
        .view-more {
            padding: 0.65rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .view-more-btn {
            color: var(--teal);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            transition: color 0.1s;
        }

        .view-more-btn:hover { color: var(--text); }

        /* ── REMINDER CARDS ── */
        .reminders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 0.75rem;
        }

        .reminder-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
        }

        .reminder-card:hover {
            background: var(--s2);
            border-color: var(--teal-dim);
        }

        .reminder-icon {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .reminder-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.3rem;
        }

        .reminder-text {
            color: var(--text-2);
            font-size: 0.78rem;
            line-height: 1.5;
        }

        .reminder-action {
            color: var(--teal);
            font-weight: 600;
            font-size: 0.75rem;
            margin-top: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* ── LEAGUES ── */
        .leagues-container {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }

        .leagues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .no-leagues {
            text-align: center;
            color: var(--text-2);
            font-size: 0.82rem;
            padding: 2rem;
        }

        .no-leagues a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            .main-content {
                max-width: none;
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }

        @media (max-width: 600px) {
            .main-content { padding: 0.75rem; }

            .leaderboard-card,
            .leagues-container,
            .reminder-card {
                width: 100%;
            }

            .leagues-grid { grid-template-columns: 1fr; }
        }
    </style>
	<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
</head>

        <!-- Global Predictions Leaderboard -->

                <button class="leaderboard-toggle-btn" id="leagueAvgBtn" onclick="setLeagueLeaderboardMode('average')">Weekly Average</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;

        // Initialize dashboard
        async function initDashboard() {
            // Check authentication
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                window.location.href = '/';
                return;
            }

            currentUser = user;

            // Load user profile and check admin status
            await loadUserProfile();

            // Load all dashboard data
            loadReminders();
            loadPredictionsLeaderboard();
            loadLeagueLeaderboard();
            loadUserLeagues();
        }
        // Load user profile
        async function loadUserProfile() {
            const profile = await window.fantasyMarching.renderHeaderUser(currentUser);
            isAdmin = (profile && profile.is_admin) || false;
        }
		function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOnOverlay(event) {
    if (event.target === event.currentTarget) {
        closeModal();
    }
}
// Simple notification function for dashboard
function showNotification(title, message, type = 'info') {
    // Create notification element
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${type === 'success' ? 'rgba(78, 205, 196, 0.1)' : type === 'error' ? 'rgba(255, 107, 107, 0.1)' : 'rgba(69, 183, 209, 0.1)'};
        border: 1px solid ${type === 'success' ? 'rgba(78, 205, 196, 0.3)' : type === 'error' ? 'rgba(255, 107, 107, 0.3)' : 'rgba(69, 183, 209, 0.3)'};
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        min-width: min(300px, calc(100vw - 2rem));
        max-width: calc(100vw - 2rem);
        animation: slideIn 0.3s ease-out;
    `;

    notification.innerHTML = `
        <div style="font-weight: 700; margin-bottom: 0.25rem;">${title}</div>
        <div style="font-size: 0.9rem; color: #e0e0e0;">${message}</div>
    `;

    document.body.appendChild(notification);

    // Auto remove after 3 seconds
    setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease-out';
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// Add the animations
const style = document.createElement('style');
style.textContent = `
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
    }
`;
document.head.appendChild(style);
        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');

            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Function to get all user predictions (for stats)
        async function getAllUserPredictions() {
            try {
                const { data, error } = await supabaseClient
                    .from('predictions')
                    .select(`
                        *,
                        events!inner(
                            name,
                            date,
                            location,
                            is_completed,
                            final_scores
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error loading all predictions:', error);
                    return [];
                }

                return data;
            } catch (error) {
                console.error('Unexpected error:', error);
                return [];
            }
        }
function handleJoinRequestFromElement(element) {
    const requestId = element.getAttribute('data-request-id');
    const leagueId = element.getAttribute('data-league-id');
    const userId = element.getAttribute('data-user-id');
    const username = element.getAttribute('data-username');
    const leagueName = element.getAttribute('data-league-name');

    handleJoinRequest(requestId, leagueId, userId, username, leagueName);
}
// Load reminders based on real data
async function loadReminders() {
    const reminders = [];

    // Check for league join requests (for league owners)
    const { data: ownedLeagues } = await supabaseClient
        .from('leagues')
        .select('id, name')
        .eq('owner_id', currentUser.id);

    if (ownedLeagues && ownedLeagues.length > 0) {
        const leagueIds = ownedLeagues.map(l => l.id);
        const { data: joinRequests } = await supabaseClient
            .from('league_join_requests')
            .select('*')
            .in('league_id', leagueIds)
            .eq('status', 'pending');

        if (joinRequests && joinRequests.length > 0) {
            // Get usernames separately
            const userIds = joinRequests.map(r => r.user_id);
            const { data: profiles } = await supabaseClient
                .from('profiles')
                .select('id, username')
                .in('id', userIds);

            const usernameMap = {};
            profiles?.forEach(p => {
                usernameMap[p.id] = p.username;
            });

			console.log('Username map:', usernameMap);
			console.log('Join requests user IDs:', userIds);
            const leagueMap = {};
            ownedLeagues.forEach(l => leagueMap[l.id] = l.name);

            joinRequests.forEach(request => {
                const username = usernameMap[request.user_id] || 'Unknown';
				console.log('Request user_id:', request.user_id, 'Username:', username);
reminders.push({
    icon: '',
    title: 'League Join Request',
    text: `${escapeHtml(username)} wants to join ${escapeHtml(leagueMap[request.league_id] || '')}`,
    action: 'Review Request',
    link: '#',
    // Change from onclick to data attributes
    dataAttrs: `data-request-id="${request.id}" data-league-id="${request.league_id}" data-user-id="${request.user_id}" data-username="${escapeHtml(username)}" data-league-name="${escapeHtml(leagueMap[request.league_id] || '')}"`,
    onclick: `handleJoinRequestFromElement(this)`
});
            });
        }
    }

    // Check for upcoming events without predictions
    const { data: upcomingEvents } = await supabaseClient
        .from('events')
        .select('*')
        .gte('date', new Date().toISOString())
        .order('date', { ascending: true })
        .limit(3);

if (upcomingEvents && upcomingEvents.length > 0) {
    for (const event of upcomingEvents) {
        const { data: prediction } = await supabaseClient
            .from('predictions')
            .select('id')
            .eq('user_id', currentUser.id)
            .eq('event_id', event.id)
            .maybeSingle();

        if (!prediction) {
            const { DateTime } = luxon;

            // fallback if no time is provided
            const eventTime = event.time || "00:00";

            // build DateTime with event's time zone
            const eventDateTime = DateTime.fromISO(`${event.date}T${eventTime}`, {
                zone: event.timezone || 'America/Chicago'
            });

            // compare to local browser time:
            const now = DateTime.local();

            const diffHours = eventDateTime.diff(now, 'hours').hours;

            let timeLeft;
            if (diffHours >= 24) {
                const daysLeft = Math.ceil(diffHours / 24);
                timeLeft = `${daysLeft} day${daysLeft !== 1 ? 's' : ''}`;
            } else if (diffHours >= 1) {
                const hoursLeft = Math.floor(diffHours);
                timeLeft = `${hoursLeft} hour${hoursLeft !== 1 ? 's' : ''}`;
            } else {
                timeLeft = `1 hour`;
            }

            reminders.push({
                icon: '',
                title: 'Predictions Due Soon',
                text: `${escapeHtml(event.name)} predictions close in ${timeLeft}`,
                action: 'Make Predictions',
                link: `/predictions.html?eventId=${event.id}`
            });
        }
    }
}

    if (completedEvents && completedEvents.length > 0) {

const grid = document.getElementById('remindersGrid');
if (reminders.length === 0) {
    grid.innerHTML = `
        <div style="text-align:center; color:#666; font-size:1rem; padding:2rem;">

} else {

        // Load predictions leaderboard
async function loadPredictionsLeaderboard() {

    try {
        let orderBy = leaderboardMode === 'accuracy' ? 'average_accuracy' : 'total_score';
		const container = document.getElementById('predictionsLeaderboard');
        const { data: stats } = await supabaseClient
            .from('prediction_leaderboard')
            .select('*')
            .order(orderBy, { ascending: false })
            .limit(5);

        if (stats && stats.length > 0) {
container.innerHTML = stats.map((player, index) => `
    <div class="leaderboard-entry">
        <div class="rank ${index < 3 ? `rank-${index + 1}` : 'rank-default'}">${index + 1}</div>
        <div class="player-info">
            <div class="player-avatar">${avatarHtml(player.avatar_url, player.username ? player.username[0].toUpperCase() : 'U')}</div>
            <a class="player-name" style="color: #4ecdc4; text-decoration: none;" href="/profile.html?userId=${encodeURIComponent(player.user_id)}">
              ${escapeHtml(player.username || 'User')}
            </a>
        </div>
        <span class="player-score">${
            leaderboardMode === 'accuracy'
            ? (player.average_accuracy * 100).toFixed(2) + '%'
            : player.total_score + ' pts'
        }</span>
    </div>
`).join('');
        }
    } catch (error) {
        console.error('Error loading predictions leaderboard:', error);
    }
}
function setLeaderboardMode(mode) {
    leaderboardMode = mode;

    // Update button states
    document.getElementById('scoreBtn').classList.toggle('active', mode === 'score');
    document.getElementById('accuracyBtn').classList.toggle('active', mode === 'accuracy');

    loadPredictionsLeaderboard();
}
function setLeagueLeaderboardMode(mode) {
    leagueLeaderboardMode = mode;

    document.getElementById('leagueTotalBtn').classList.toggle('active', mode === 'total');
    document.getElementById('leagueAvgBtn').classList.toggle('active', mode === 'average');

    loadLeagueLeaderboard();
}

                    </div>
                    <span class="player-score">${player.score}%</span>
                </div>
            `).join('');
        }

        // Load league leaderboard
async function loadLeagueLeaderboard() {
    try {
        let orderBy = leagueLeaderboardMode === 'average' ? 'average_points' : 'total_points';

        const { data } = await supabaseClient
            .from('global_league_leaderboard')
            .select('*')
            .order(orderBy, { ascending: false })
            .limit(5);

        const container = document.getElementById('leagueLeaderboard');

        if (data && data.length > 0) {
            container.innerHTML = data.map((player, index) => `
                <div class="leaderboard-entry">
                    <div class="rank ${index < 3 ? `rank-${index + 1}` : 'rank-default'}">${index + 1}</div>
                    <div class="player-info">
                        <div class="player-avatar">${avatarHtml(player.avatar_url, player.username ? player.username[0].toUpperCase() : 'U')}</div>
                        <a class="player-name" style="color: #4ecdc4; text-decoration: none;" href="/profile.html?userId=${encodeURIComponent(player.user_id)}">
  ${escapeHtml(player.username || 'User')}
</a>
                    </div>
                    <span class="player-score">${
leagueLeaderboardMode === 'average'
  ? (player.average_points || 0) + ' pts'
  : (player.total_points || 0) + ' pts'
                    }</span>
                </div>
            `).join('');
        } else {

        // Load user's leagues
async function loadUserLeagues() {
    const { data: userLeagues, error } = await supabaseClient
        .from('league_members')
        .select(`
            league_id,
            role,
            leagues (
                id,
                name,
                is_global
            )
        `)
        .eq('user_id', currentUser.id)
        .eq('status', 'active');

    if (error) {
        console.error('Error loading user leagues:', error);
        return;
    }

    const grid = document.getElementById('leaguesGrid');

    // Check if user has no leagues
    if (!userLeagues || userLeagues.length === 0) {
        grid.innerHTML = `
            <div class="no-leagues">
                You are currently in no leagues. <a href="/league.html">Join a league in the league tab!</a>
            </div>
        `;
        return;
    }

    // Get real stats for each league
    const leagueCards = await Promise.all(userLeagues.map(async (item) => {
        const league = item.leagues;

        // Check if draft has happened
        const { data: draftData } = await supabaseClient
            .from('league_drafts')
            .select('status')
            .eq('league_id', league.id)
            .maybeSingle();

        if (!draftData || draftData.status !== 'completed') {
            // Pre-draft league
            return `
                <div class="leaderboard-card">
                    <h3 class="leaderboard-title">${escapeHtml(league.name)}</h3>
                    <div style="text-align: center; padding: 2rem; color: #666;">
                        <p>Draft not started</p>
                        ${item.role === 'owner' ? '<p style="margin-top: 0.5rem; color: #ffd700;">You are the owner</p>' : ''}
                    </div>
                    <div class="view-more">
                        <a href="/league-detail.html?id=${league.id}" class="view-more-btn">View League →</a>
                    </div>
                </div>
            `;
        }

        // Get user's team
        const { data: team } = await supabaseClient
            .from('league_teams')
            .select('id')
            .eq('league_id', league.id)
            .eq('user_id', currentUser.id)
            .maybeSingle();

        if (!team) {
            return ''; // Skip if no team found
        }

        // Get all teams for ranking
        const { data: allTeams } = await supabaseClient
            .from('league_teams')
            .select('id, user_id')
            .eq('league_id', league.id);

        // Get matchups for stats
        const { data: matchups } = await supabaseClient
            .from('league_matchups')
            .select('*')
            .eq('league_id', league.id)
            .or(`team1_id.eq.${team.id},team2_id.eq.${team.id}`);

        // Calculate stats
        let wins = 0, losses = 0, totalScore = 0, gamesPlayed = 0;

        if (matchups) {
            matchups.forEach(matchup => {
                if (matchup.winner_id) {
                    gamesPlayed++;
                    if (matchup.winner_id === team.id) {
                        wins++;
                    } else {
                        losses++;
                    }

                    if (matchup.team1_id === team.id) {
                        totalScore += matchup.team1_score || 0;
                    } else {
                        totalScore += matchup.team2_score || 0;
                    }
                }
            });
        }

        // Calculate rank
        const { data: allMatchups } = await supabaseClient
            .from('league_matchups')
            .select('*')
            .eq('league_id', league.id)
            .not('winner_id', 'is', null);

        const teamRecords = [];
        if (allTeams) {
            allTeams.forEach(t => {
                let teamWins = 0;
                let teamTotal = 0;
                let teamGames = 0;

                allMatchups?.forEach(m => {
                    if (m.team1_id === t.id || m.team2_id === t.id) {
                        teamGames++;
                        if (m.winner_id === t.id) teamWins++;
                        if (m.team1_id === t.id) {
                            teamTotal += m.team1_score || 0;
                        } else {
                            teamTotal += m.team2_score || 0;
                        }
                    }
                });

                teamRecords.push({
                    id: t.id,
                    user_id: t.user_id,
                    wins: teamWins,
                    winPct: teamGames > 0 ? teamWins / teamGames : 0,
                    avgScore: teamGames > 0 ? teamTotal / teamGames : 0
                });
            });
        }

        // Sort by win percentage, then by average score
        teamRecords.sort((a, b) => {
            if (b.winPct !== a.winPct) return b.winPct - a.winPct;
            return b.avgScore - a.avgScore;
        });

        const rank = teamRecords.findIndex(t => t.id === team.id) + 1;
        const totalTeams = allTeams ? allTeams.length : 0;
        const avgScore = gamesPlayed > 0 ? (totalScore / gamesPlayed).toFixed(1) : '0.0';

        // Get top player info if not the owner
        let leaderInfo = '';
        if (item.role !== 'owner' && teamRecords.length > 0 && teamRecords[0].id !== team.id) {
            // Get the leader's username
            const { data: leaderProfile } = await supabaseClient
                .from('profiles')
                .select('username')
                .eq('id', teamRecords[0].user_id)
                .maybeSingle();

            const leaderName = leaderProfile?.username || 'Unknown';
            const leaderScore = teamRecords[0].avgScore.toFixed(1);
            leaderInfo = `Leader: ${leaderName} (${leaderScore} pts)`;
        }

        return `
            <div class="leaderboard-card">
                <h3 class="leaderboard-title">${escapeHtml(league.name)}</h3>
                <div class="leaderboard-entry" style="background: rgba(78, 205, 196, 0.1);">
                    <div class="rank ${rank <= 3 ? `rank-${rank}` : 'rank-default'}">${rank}</div>
                    <div class="player-info">
                        <span class="player-name">Your Position</span>
                    </div>
                    <span class="player-score">${rank}/${totalTeams}</span>
                </div>
                <div style="margin: 1rem 0; text-align: center; color: #666; font-size: 0.9rem;">
                    Record: ${wins}-${losses} • Avg Score: ${avgScore}
                    <br>${item.role === 'owner' ? 'You are the owner' : leaderInfo}
                </div>
                <div class="view-more">
                    <a href="/league-detail.html?id=${league.id}" class="view-more-btn">View League →</a>
                </div>
            </div>
        `;
    }));

    grid.innerHTML = leagueCards.filter(card => card).join('');
}

            const { error: updateError } = await supabaseClient
                .from('league_join_requests')
                .update({ status: 'approved' })
                .eq('id', currentRequestId);

            if (updateError) throw updateError;

            // Add user to league
            const { error: memberError } = await supabaseClient
                .from('league_members')
                .insert({
                    league_id: currentRequestLeagueId,
                    user_id: currentRequestUserId,

            const modalButtons = document.getElementById('modalButtons');

            if (showInput) {
                modalInput.style.display = 'block';

                modalInput.style.display = 'none';

            // Clear and add buttons

                btn.className = `modal-btn ${button.primary ? 'modal-btn-primary' : 'modal-btn-secondary'}`;

btn.onclick = () => {

};

// If before season start, return week 1
if (now < new Date('2025-06-28')) return 1;

	async function viewGlobalTeamLineup() {
    try {
        // get the user's global team
        const { data: team } = await supabaseClient
            .from('global_league_teams')
            .select('*')
            .eq('user_id', currentUser.id)
            .maybeSingle();

        if (!team) {
            showNotification('Error', 'No global league team found', 'error');
            return;
        }

        // get team roster
        const { data: roster } = await supabaseClient
            .from('global_league_roster')
            .select('*')
            .eq('team_id', team.id)
            .order('caption');

        if (!roster || roster.length === 0) {
            showNotification('Error', 'No roster found for your global team', 'error');
            return;
        }

        // get finalized week
        const currentWeek = await getCurrentWeekFromDB();
        const today = new Date();
        const nextMonday = new Date(today);
        nextMonday.setDate(today.getDate() + (8 - today.getDay()) % 7);
        nextMonday.setHours(0,0,0,0);
        let finalizedWeek = today < nextMonday ? currentWeek - 1 : currentWeek;
        finalizedWeek = Math.max(1, finalizedWeek);
const weekToDisplay = Math.max(1, currentWeek);
        // week ranges
        const weekDateRanges = [
            { start: new Date('2025-06-28'), end: new Date('2025-06-29') },
            { start: new Date('2025-06-30'), end: new Date('2025-07-06') },
            { start: new Date('2025-07-07'), end: new Date('2025-07-13') },
            { start: new Date('2025-07-14'), end: new Date('2025-07-20') },
            { start: new Date('2025-07-21'), end: new Date('2025-07-27') },
            { start: new Date('2025-07-28'), end: new Date('2025-08-03') }
        ];
        const weekRange = weekDateRanges[weekToDisplay - 1];

        // get week events
        const { data: weekEvents } = await supabaseClient
            .from('events')
            .select('id')
            .gte('date', weekRange.start.toISOString().split('T')[0])
            .lte('date', weekRange.end.toISOString().split('T')[0])
            .eq('is_completed', true);

        const eventIds = weekEvents?.map(e => e.id) || [];
        let weekScores = {};

        if (eventIds.length > 0) {
            const { data: scores } = await supabaseClient
                .from('event_scores')
                .select('*')
                .in('event_id', eventIds);

            scores?.forEach(score => {
                if (!weekScores[score.corps_name]) {
                    weekScores[score.corps_name] = {
                        brass: [],
                        percussion: [],
                        guard: [],
                        ge: [],
                        visual: [],
                        music: []
                    };
                }
                if (score.brass_score !== null) weekScores[score.corps_name].brass.push(score.brass_score);
                if (score.percussion_score !== null) weekScores[score.corps_name].percussion.push(score.percussion_score);
                if (score.color_guard_score !== null) weekScores[score.corps_name].guard.push(score.color_guard_score);
                if (score.general_effect_score !== null) weekScores[score.corps_name].ge.push(score.general_effect_score);
                if (score.visual_score !== null) weekScores[score.corps_name].visual.push(score.visual_score);
                if (score.music_score !== null) weekScores[score.corps_name].music.push(score.music_score);
            });
        }

        let totalScore = 0;

        showModal(
            `Your Global League Lineup - Week ${weekToDisplay}`,
            '',
            [
                { text: 'Close', primary: true, callback: null }
            ]
        );

        const modalMessage = document.getElementById('modalMessage');
        modalMessage.innerHTML = `
            <div style="display: grid; gap: 1rem; margin-top: 1rem;">
                ${['brass','percussion','guard','ge','visual','music'].map(caption => {
                    const captionRoster = roster.filter(r => r.caption === caption);
                    let captionTotal = 0;

                    const rosterWithScores = captionRoster.map(r => {
                        const corpsScores = weekScores[r.corps_name];
                        let avgScore = 0;

                        if (corpsScores && corpsScores[caption].length > 0) {
                            avgScore = corpsScores[caption].reduce((sum,s) => sum+s, 0) / corpsScores[caption].length;
                            captionTotal += avgScore;
                            totalScore += avgScore;
                        }
                        return { ...r, avgScore };
                    });

                    return `
                        <div style="background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1rem; border-left: 3px solid ${getCaptionColor(caption)};">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                                <div style="font-weight:600; color:${getCaptionColor(caption)}; text-transform:capitalize;">
                                    ${caption === 'guard' ? 'Color Guard' : caption === 'ge' ? 'General Effect' : caption}
                                </div>
                                <div style="font-weight:700; color:#4ecdc4;">
                                    ${captionTotal > 0 ? captionTotal.toFixed(2) : '0.00'}
                                </div>
                            </div>
                            ${rosterWithScores.map(r => `
                                <div style="padding:0.5rem 0; color:#e0e0e0; display:flex; justify-content:space-between;">
                                    ${r.corps_name}
                                    <span style="color:${r.avgScore>0?'#4ecdc4':'#666'};">
                                        ${r.avgScore>0 ? r.avgScore.toFixed(3) : 'No score'}
                                    </span>
                                </div>
                            `).join('') || '<div style="color:#666;">No selection</div>'}
                        </div>
                    `;
                }).join('')}
            </div>
            <div style="margin-top: 1.5rem; padding: 1rem; background: linear-gradient(135deg,#4ecdc4 0%,#45b7d1 100%); border-radius:12px; text-align:center;">
                <div style="color: rgba(255,255,255,0.9); font-size:0.9rem;">Total Score</div>
                <div style="color:white; font-size:2rem; font-weight:800;">
                    ${totalScore.toFixed(3)}
                </div>
            </div>
        `;
    } catch (error) {
        console.error('Error viewing global team lineup:', error);
        showNotification('Error', 'Failed to load global team lineup', 'error');
    }
}
