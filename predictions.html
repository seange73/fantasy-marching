<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Drum Corps: Make Predictions</title>
	<link rel="icon" href="/images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Styles */
        .header {
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 75px;
            width: auto;
            display: block;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 2rem;
            flex: 1;
            justify-content: center;
        }

        .nav-tab {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab.active {
            color: #4ecdc4;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            border-radius: 2px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            position: relative;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        /* Profile Dropdown */
        .profile-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .dropdown-item.admin {
            color: #4ecdc4;
        }

        .dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
        }

        .dropdown-icon {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        .event-header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 50%, #6c5ce7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0a0;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            transform: translateX(-4px);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .score-predictions {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #4ecdc4;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .corps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .corps-score-input {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .corps-score-input:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .corps-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #ffffff;
            text-align: center;
        }

        .score-input-container {
            position: relative;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .caption-awards {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }

        .caption-award-group {
            margin-bottom: 2rem;
        }

        .caption-award-group:last-child {
            margin-bottom: 0;
        }

        .caption-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #45b7d1;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .caption-icon {
            font-size: 1.5rem;
        }

        .corps-select {
            width: 100%;
            padding: 0.875rem;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='white' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'><path d='M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 0.7rem top 50%;
            background-size: 1.5rem;
            padding-right: 2.5rem;
        }

        .corps-select:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2);
            background-color: rgba(255, 255, 255, 0.12);
        }

        .corps-select option {
            background: #1a1a2e;
            color: white;
        }

        .leaderboard-section {
            width: 100%;
        }

        .leaderboard {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            min-height: 300px;
        }

        .leaderboard-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #4ecdc4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem 1rem 60px;
            margin-bottom: 0.75rem;
            border-radius: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-weight: 600;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .leaderboard-entry::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            transition: width 0.3s ease;
        }

        .rank-number {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            font-weight: 800;
            opacity: 0.8;
            width: 30px;
            text-align: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .corps-total {
            background: transparent;
        }

        .gold {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .gold::before {
            background: #ffd700;
            width: 6px;
        }

        .silver {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            color: #000;
            box-shadow: 0 8px 25px rgba(192, 192, 192, 0.3);
        }

        .silver::before {
            background: #c0c0c0;
            width: 5px;
        }

        .bronze {
            background: linear-gradient(135deg, #cd7f32 0%, #e8a857 100%);
            color: #000;
            box-shadow: 0 8px 25px rgba(205, 127, 50, 0.3);
        }

        .bronze::before {
            background: #cd7f32;
            width: 4px;
        }

        .default {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .default::before {
    background: transparent;
}

        .submit-section {
            text-align: center;
            margin-top: 3rem;
        }

        .submit-btn {
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(78, 205, 196, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
        }

        .submit-msg {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #4ecdc4;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .submit-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .submit-msg.error {
            color: #ff6b6b;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .corps-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            
            .header-content {
                padding: 1rem;
            }
            
            .nav-tabs {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .user-name {
                display: none;
            }
        }

        .animate-in {
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .leaderboard-entry {
            animation: fadeInScale 0.4s ease forwards;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
		.leaderboard,
.score-predictions,
.caption-awards {
    margin-bottom: 2rem;
}

		@media (max-width: 768px) {
		.leaderboard,
		.score-predictions,
		.caption-awards {
        margin-bottom: 2rem;
    }
	
}

  .main-content {
    max-width: none !important;

    margin: 0 !important;
    padding-left: 1rem;
    padding-right: 1rem;
  }
  @media (max-width: 600px) and (orientation: portrait) {

  }
  .leaderboard-card,
  .leagues-container,
  .reminder-card {

    box-sizing: border-box;
  }
}

                <!-- Profile Dropdown -->

                    </a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;
        let currentEvent = null;
        let existingPrediction = null;
        let corpsList = [];
        const predictions = {};
        const captionPredictions = {
            guard: '',
            percussion: '',
            brass: ''
        };

        // Get event ID from URL
        function getEventIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('eventId');
        }

        // Initialize page
        async function initializePage() {
            // Check authentication
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            currentUser = user;
            
            // Load user profile
            await loadUserProfile();
            
            // Load event data
            const eventId = getEventIdFromUrl();
            if (!eventId) {
                alert('No event specified');
                window.location.href = '/predictions-dashboard.html';
                return;
            }
            
            await loadEventData(eventId);
        }

        // Load user profile
        async function loadUserProfile() {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('username, avatar_url, is_admin')
                .eq('id', currentUser.id)
                .single();
            
            if (profile) {
                document.getElementById('userName').textContent = profile.username || currentUser.email.split('@')[0];
                
                // Set avatar (initial letter for now)
                const initial = (profile.username || currentUser.email)[0].toUpperCase();
                document.getElementById('userAvatar').textContent = initial;
                
                // Check admin status
                isAdmin = profile.is_admin || false;
                if (isAdmin) {
                    document.getElementById('adminLink').style.display = 'flex';
                    document.getElementById('adminDivider').style.display = 'block';
                }
            }
        }

        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Load event data
        async function loadEventData(eventId) {
            // Load event details
            const { data: event, error: eventError } = await supabaseClient
                .from('events')
                .select('*')
                .eq('id', eventId)
                .single();
            
            if (eventError || !event) {
                alert('Event not found');
                window.location.href = '/predictions-dashboard.html';
                return;
            }
            
            currentEvent = event;
            corpsList = event.corps_list || [];
            
            // Check if event has already passed
// Use Luxon to combine date + time + timezone
const eventDateTime = luxon.DateTime.fromISO(`${event.date}T${event.time}`, {
    zone: event.timezone
});

// Convert to local time
const eventInLocal = eventDateTime.toLocal();

// Compare with current local time
if (eventInLocal < luxon.DateTime.local() && !event.is_completed) {
    alert('This event has already passed. Predictions are closed.');
    window.location.href = '/predictions-dashboard.html';
    return;
}
            
            // Display event info
            document.getElementById('eventName').textContent = event.name;
            document.getElementById('eventDate').textContent = eventInLocal.toLocaleString(luxon.DateTime.DATETIME_MED);
            document.getElementById('eventLocation').textContent = event.location || 'Location TBD';
            
            // Check for existing prediction
            const { data: prediction } = await supabaseClient
                .from('predictions')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('event_id', eventId)
                .single();
            
            if (prediction) {
                existingPrediction = prediction;
                document.getElementById('submitBtn').textContent = 'Update Predictions';
                
                // Load existing predictions
                if (prediction.score_predictions) {
                    Object.assign(predictions, prediction.score_predictions);
                }
                if (prediction.caption_predictions) {
                    Object.assign(captionPredictions, prediction.caption_predictions);
                }
            }
            
            // Hide loading, show content
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('submitSection').style.display = 'block';
            
            // Initialize the prediction form
            createScoreInputs();
            populateCaptionDropdowns();
            
            // If editing, populate existing values
            if (existingPrediction) {
                populateExistingPredictions();
            }
        }

        // Create score input fields
        function createScoreInputs() {
            const container = document.getElementById('corpsGrid');
            container.innerHTML = '';
            
            corpsList.forEach((corps, index) => {
                const div = document.createElement('div');
                div.className = 'corps-score-input animate-in';
                div.style.animationDelay = `${index * 0.05}s`;
                
                div.innerHTML = `
                    <div class="corps-name">${corps}</div>
                    <div class="score-input-container">
                        <input type="number" 
                               id="score_${corps.replace(/\s+/g, '_')}"
                               min="0" 
                               max="100" 
                               step="0.001" 
                               placeholder="0.000" 
                               oninput="handleScoreInput('${corps}', this.value)"
                               onblur="formatScore(this)">
                    </div>
                `;
                
                container.appendChild(div);
            });
        }

        // Populate caption award dropdowns
        function populateCaptionDropdowns() {
            const dropdowns = ['guardWinner', 'percussionWinner', 'brassWinner'];
            
            dropdowns.forEach(dropdownId => {
                const select = document.getElementById(dropdownId);
                select.innerHTML = '<option value="">Select a corps...</option>';
                
                corpsList.forEach(corps => {
                    const option = document.createElement('option');
                    option.value = corps;
                    option.textContent = corps;
                    select.appendChild(option);
                });
                
                // Add event listener
                select.addEventListener('change', (e) => {
                    const captionType = dropdownId.replace('Winner', '');
                    captionPredictions[captionType] = e.target.value;
                });
            });
        }

        // Populate existing predictions if editing
        function populateExistingPredictions() {
            // Populate scores
            Object.entries(predictions).forEach(([corps, score]) => {
                const input = document.getElementById(`score_${corps.replace(/\s+/g, '_')}`);
                if (input) {
                    input.value = score.toFixed(3);
                }
            });
            
            // Populate caption awards
            if (captionPredictions.guard) {
                document.getElementById('guardWinner').value = captionPredictions.guard;
            }
            if (captionPredictions.percussion) {
                document.getElementById('percussionWinner').value = captionPredictions.percussion;
            }
            if (captionPredictions.brass) {
                document.getElementById('brassWinner').value = captionPredictions.brass;
            }
            
            // Update leaderboard
            updateLeaderboard();
        }

        // Handle score input
        function handleScoreInput(corps, value) {
            let numValue = parseFloat(value);
            
            // Validate input
            if (isNaN(numValue)) {
                predictions[corps] = 0;
            } else if (numValue > 100) {
                event.target.value = 100;
                predictions[corps] = 100;
            } else if (numValue < 0) {
                event.target.value = 0;
                predictions[corps] = 0;
            } else {
                predictions[corps] = numValue;
            }
            
            updateLeaderboard();
        }

        // Format score display
        function formatScore(input) {
            const value = parseFloat(input.value);
            if (!isNaN(value)) {
                input.value = value.toFixed(3);
            }
        }

        // Update leaderboard display
        function updateLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            
            // Get all corps with scores
            const ranked = corpsList
                .map(corps => ({
                    corps,
                    score: predictions[corps] || 0
                }))
                .filter(entry => entry.score > 0)
                .sort((a, b) => b.score - a.score);

            if (ranked.length === 0) {
                leaderboard.innerHTML = '<div style="text-align: center; color: #666; margin-top: 2rem;">Enter predictions to see rankings</div>';
                return;
            }

            leaderboard.innerHTML = '';
            
            ranked.forEach((entry, index) => {
                const div = document.createElement('div');
                let cls = 'default';
                if (index === 0) cls = 'gold';
                else if (index === 1) cls = 'silver'; 
                else if (index === 2) cls = 'bronze';
                
                div.className = `leaderboard-entry ${cls}`;
                div.innerHTML = `
                    <div class="rank-number">${index + 1}</div>
                    <strong>${entry.corps}</strong>
                    <div class="corps-total">${entry.score.toFixed(3)}</div>
                `;
                
                leaderboard.appendChild(div);
            });
        }

        // Submit predictions to Supabase
        async function submitPredictions() {
            // Validate that at least one score is entered
            const hasScores = Object.values(predictions).some(score => score > 0);
            
            if (!hasScores) {
                showMessage('Please enter at least one score prediction!', 'error');
                return;
            }
            
            // Disable submit button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            try {
                const predictionData = {
                    user_id: currentUser.id,
                    event_id: currentEvent.id,
                    event_name: currentEvent.name,
                    event_date: currentEvent.date,
                    score_predictions: predictions,
                    caption_predictions: captionPredictions,
                    updated_at: new Date().toISOString()
                };
                
                let result;
                
                if (existingPrediction) {
                    // Update existing prediction
                    const { data, error } = await supabaseClient
                        .from('predictions')
                        .update(predictionData)
                        .eq('id', existingPrediction.id)
                        .select()
                        .single();
                    
                    if (error) throw error;
                    result = data;
                } else {
                    // Insert new prediction
                    const { data, error } = await supabaseClient
                        .from('predictions')
                        .insert(predictionData)
                        .select()
                        .single();
                    
                    if (error) throw error;
                    result = data;
                    existingPrediction = result;
                }
                
                showMessage('Predictions saved successfully! 🎺', 'success');
                
                // Update button text
                submitBtn.textContent = 'Update Predictions';
                
                // Redirect after a short delay
                setTimeout(() => {
                    window.location.href = '/predictions-dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error saving predictions:', error);
                showMessage('Error saving predictions. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = existingPrediction ? 'Update Predictions' : 'Submit Predictions';
            }
        }

        // Show message to user
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('submitMsg');
            msg.textContent = text;
            msg.className = `submit-msg ${type}`;
            msg.classList.add('show');
            
            setTimeout(() => {
                msg.classList.remove('show');
            }, 5000);
        }

        // Initialize the page when loaded
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
