<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Drum Corps: Make Predictions</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.75rem; }
        .event-header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-2); font-size: 0.85rem; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--teal);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: opacity 0.1s;
        }
        .back-link:hover { opacity: 0.8; }
        .main-content { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
        .score-predictions,
        .caption-awards,
        .leaderboard {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.25rem;
        }
        .corps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        .corps-score-input {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem;
        }
        .corps-score-input:hover { background: var(--s3); }
        .corps-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            margin-bottom: 0.5rem;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            background: var(--s3);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--mono);
            text-align: center;
            transition: border-color 0.1s;
        }
        input[type="number"]:focus { outline: none; border-color: var(--teal); }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .caption-award-group { margin-bottom: 1.25rem; }
        .caption-award-group:last-child { margin-bottom: 0; }
        .caption-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .corps-select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: var(--s3);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
            font-family: var(--body);
            cursor: pointer;
            appearance: none;
        }
        .corps-select:focus { outline: none; border-color: var(--teal); }
        .corps-select option { background: var(--s2); color: var(--text); }
        .leaderboard-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.55rem 1rem 0.55rem 44px;
            margin-bottom: 0.35rem;
            border-radius: 4px;
            position: relative;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .rank-number {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            font-weight: 700;
            font-family: var(--mono);
        }
        .corps-total { font-family: var(--mono); font-size: 0.85rem; }
        .gold { background: #b8860b; color: #fff; }
        .silver { background: var(--s3); color: var(--text); border: 1px solid #888; }
        .bronze { background: #7c4a1e; color: #fff; }
        .default { background: var(--s2); color: var(--text); border: 1px solid var(--border); }
        .submit-section { text-align: center; margin-top: 2rem; }
        .submit-btn {
            background: var(--teal);
            color: var(--bg);
            border: none;
            border-radius: 4px;
            padding: 0.65rem 2rem;
            font-size: 0.875rem;
            font-weight: 700;
            font-family: var(--body);
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .submit-btn:hover { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .submit-msg {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--teal);
            opacity: 0;
        }
        .submit-msg.show { opacity: 1; }
        .submit-msg.error { color: #ff6b6b; }
        .loading { text-align: center; padding: 3rem 2rem; color: var(--text-2); }
        @media (max-width: 600px) {
            .corps-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/dashboard.html" class="logo-link">
                <img src="images/logo.png" alt="Fantasy Marching" class="logo-img">
            </a>
            <nav class="nav">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/predictions-dashboard.html" class="active">Predictions</a>
                <a href="/league.html">League</a>
                <a href="/information.html">Information</a>
            </nav>
            <div class="header-right">
                <div class="user-profile" onclick="toggleUserMenu()">
                    <div class="user-avatar" id="userAvatar"></div>
                    <span class="user-name" id="userName">Loading...</span>
                    <div class="profile-dropdown" id="profileDropdown">
                        <a href="/profile.html" class="dropdown-item"><span class="dropdown-icon">👤</span><span>Profile</span></a>
                        <div class="dropdown-divider"></div>
                        <a href="/admin.html" class="dropdown-item admin" id="adminLink" style="display:none;"><span class="dropdown-icon">🛡️</span><span>Admin Panel</span></a>
                        <div class="dropdown-divider" id="adminDivider" style="display:none;"></div>
                        <div class="dropdown-item" onclick="logout()"><span class="dropdown-icon">🚪</span><span>Logout</span></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <a href="/predictions-dashboard.html" class="back-link">← Back to All Events</a>
        
        <div class="event-header animate-in">
            <h1 id="eventName">Loading Event...</h1>
            <p class="subtitle" id="eventDate"></p>
            <p class="subtitle" id="eventLocation"></p>
        </div>

        <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading event data...</p>
        </div>

        <div id="mainContent" class="main-content" style="display: none;">
            <div class="leaderboard-section">
                <div class="leaderboard">
                    <h2 class="leaderboard-title">Predicted Rankings</h2>
                    <div id="leaderboard">
                        <div style="text-align: center; color: #666; margin-top: 2rem;">
                            Enter predictions to see rankings
                        </div>
                    </div>
                </div>
            </div>

            <!-- Score Predictions -->
            <div class="score-predictions">
                <h2 class="section-title">Score Predictions</h2>
                <div class="corps-grid" id="corpsGrid">
                    <!-- Corps inputs will be generated here -->
                </div>
            </div>

            <!-- Caption Awards -->
            <div class="caption-awards">
                <h2 class="section-title">Caption Awards</h2>
                
                <div class="caption-award-group">
                    <div class="caption-title">
                        <span>Best Color Guard</span>
                    </div>
                    <select class="corps-select" id="guardWinner">
                        <option value="">Select a corps...</option>
                    </select>
                </div>

                <div class="caption-award-group">
                    <div class="caption-title">
                        <span>Best Percussion</span>
                    </div>
                    <select class="corps-select" id="percussionWinner">
                        <option value="">Select a corps...</option>
                    </select>
                </div>

                <div class="caption-award-group">
                    <div class="caption-title">
                        <span>Best Brass</span>
                    </div>
                    <select class="corps-select" id="brassWinner">
                        <option value="">Select a corps...</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="submit-section" id="submitSection" style="display: none;">
            <button class="submit-btn" id="submitBtn" onclick="submitPredictions()">Submit Predictions</button>
            <div id="submitMsg" class="submit-msg"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;
        let currentEvent = null;
        let existingPrediction = null;
        let corpsList = [];
        const predictions = {};
        const captionPredictions = {
            guard: '',
            percussion: '',
            brass: ''
        };

        // Get event ID from URL
        function getEventIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('eventId');
        }

        // Initialize page
        async function initializePage() {
            // Check authentication
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            currentUser = user;
            
            // Load user profile
            await loadUserProfile();
            
            // Load event data
            const eventId = getEventIdFromUrl();
            if (!eventId) {
                alert('No event specified');
                window.location.href = '/predictions-dashboard.html';
                return;
            }
            
            await loadEventData(eventId);
        }

        // Load user profile
        async function loadUserProfile() {
            const profile = await window.fantasyMarching.renderHeaderUser(currentUser);
            isAdmin = (profile && profile.is_admin) || false;
        }

        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Load event data
        async function loadEventData(eventId) {
            // Load event details
            const { data: event, error: eventError } = await supabaseClient
                .from('events')
                .select('*')
                .eq('id', eventId)
                .single();
            
            if (eventError || !event) {
                alert('Event not found');
                window.location.href = '/predictions-dashboard.html';
                return;
            }
            
            currentEvent = event;
            corpsList = event.corps_list || [];
            
            // Check if event has already passed
// Use Luxon to combine date + time + timezone
const eventDateTime = luxon.DateTime.fromISO(`${event.date}T${event.time}`, {
    zone: event.timezone
});

// Convert to local time
const eventInLocal = eventDateTime.toLocal();

// Compare with current local time
if (eventInLocal < luxon.DateTime.local() && !event.is_completed) {
    alert('This event has already passed. Predictions are closed.');
    window.location.href = '/predictions-dashboard.html';
    return;
}
            
            // Display event info
            document.getElementById('eventName').textContent = event.name;
            document.getElementById('eventDate').textContent = eventInLocal.toLocaleString(luxon.DateTime.DATETIME_MED);
            document.getElementById('eventLocation').textContent = event.location || 'Location TBD';
            
            // Check for existing prediction
            const { data: prediction } = await supabaseClient
                .from('predictions')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('event_id', eventId)
                .single();
            
            if (prediction) {
                existingPrediction = prediction;
                document.getElementById('submitBtn').textContent = 'Update Predictions';
                
                // Load existing predictions
                if (prediction.score_predictions) {
                    Object.assign(predictions, prediction.score_predictions);
                }
                if (prediction.caption_predictions) {
                    Object.assign(captionPredictions, prediction.caption_predictions);
                }
            }
            
            // Hide loading, show content
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('submitSection').style.display = 'block';
            
            // Initialize the prediction form
            createScoreInputs();
            populateCaptionDropdowns();
            
            // If editing, populate existing values
            if (existingPrediction) {
                populateExistingPredictions();
            }
        }

        // Create score input fields
        function createScoreInputs() {
            const container = document.getElementById('corpsGrid');
            container.innerHTML = '';
            
            corpsList.forEach((corps, index) => {
                const div = document.createElement('div');
                div.className = 'corps-score-input animate-in';
                div.style.animationDelay = `${index * 0.05}s`;
                
                div.innerHTML = `
                    <div class="corps-name corps-link" data-corps-info="${escapeHtml(corps)}" title="View ${escapeHtml(corps)} stats">${escapeHtml(corps)}</div>
                    <div class="score-input-container">
                        <input type="number"
                               id="score_${corps.replace(/\s+/g, '_')}"
                               min="0"
                               max="100"
                               step="0.001"
                               placeholder="0.000"
                               oninput="handleScoreInput('${jsStr(corps)}', this.value)"
                               onblur="formatScore(this)">
                    </div>
                `;
                
                container.appendChild(div);
            });
        }

        // Populate caption award dropdowns
        function populateCaptionDropdowns() {
            const dropdowns = ['guardWinner', 'percussionWinner', 'brassWinner'];
            
            dropdowns.forEach(dropdownId => {
                const select = document.getElementById(dropdownId);
                select.innerHTML = '<option value="">Select a corps...</option>';
                
                corpsList.forEach(corps => {
                    const option = document.createElement('option');
                    option.value = corps;
                    option.textContent = corps;
                    select.appendChild(option);
                });
                
                // Add event listener
                select.addEventListener('change', (e) => {
                    const captionType = dropdownId.replace('Winner', '');
                    captionPredictions[captionType] = e.target.value;
                });
            });
        }

        // Populate existing predictions if editing
        function populateExistingPredictions() {
            // Populate scores
            Object.entries(predictions).forEach(([corps, score]) => {
                const input = document.getElementById(`score_${corps.replace(/\s+/g, '_')}`);
                if (input) {
                    input.value = score.toFixed(3);
                }
            });
            
            // Populate caption awards
            if (captionPredictions.guard) {
                document.getElementById('guardWinner').value = captionPredictions.guard;
            }
            if (captionPredictions.percussion) {
                document.getElementById('percussionWinner').value = captionPredictions.percussion;
            }
            if (captionPredictions.brass) {
                document.getElementById('brassWinner').value = captionPredictions.brass;
            }
            
            // Update leaderboard
            updateLeaderboard();
        }

        // Handle score input
        function handleScoreInput(corps, value) {
            let numValue = parseFloat(value);
            
            // Validate input
            if (isNaN(numValue)) {
                predictions[corps] = 0;
            } else if (numValue > 100) {
                event.target.value = 100;
                predictions[corps] = 100;
            } else if (numValue < 0) {
                event.target.value = 0;
                predictions[corps] = 0;
            } else {
                predictions[corps] = numValue;
            }
            
            updateLeaderboard();
        }

        // Format score display
        function formatScore(input) {
            const value = parseFloat(input.value);
            if (!isNaN(value)) {
                input.value = value.toFixed(3);
            }
        }

        // Update leaderboard display
        function updateLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            
            // Get all corps with scores
            const ranked = corpsList
                .map(corps => ({
                    corps,
                    score: predictions[corps] || 0
                }))
                .filter(entry => entry.score > 0)
                .sort((a, b) => b.score - a.score);

            if (ranked.length === 0) {
                leaderboard.innerHTML = '<div style="text-align: center; color: #666; margin-top: 2rem;">Enter predictions to see rankings</div>';
                return;
            }

            leaderboard.innerHTML = '';
            
            ranked.forEach((entry, index) => {
                const div = document.createElement('div');
                let cls = 'default';
                if (index === 0) cls = 'gold';
                else if (index === 1) cls = 'silver'; 
                else if (index === 2) cls = 'bronze';
                
                div.className = `leaderboard-entry ${cls}`;
                div.innerHTML = `
                    <div class="rank-number">${index + 1}</div>
                    <strong class="corps-link" data-corps-info="${escapeHtml(entry.corps)}">${escapeHtml(entry.corps)}</strong>
                    <div class="corps-total">${entry.score.toFixed(3)}</div>
                `;
                
                leaderboard.appendChild(div);
            });
        }

        // Submit predictions to Supabase
        async function submitPredictions() {
            // Validate that at least one score is entered
            const hasScores = Object.values(predictions).some(score => score > 0);
            
            if (!hasScores) {
                showMessage('Please enter at least one score prediction!', 'error');
                return;
            }
            
            // Disable submit button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            try {
                const predictionData = {
                    user_id: currentUser.id,
                    event_id: currentEvent.id,
                    event_name: currentEvent.name,
                    event_date: currentEvent.date,
                    score_predictions: predictions,
                    caption_predictions: captionPredictions,
                    updated_at: new Date().toISOString()
                };
                
                let result;
                
                if (existingPrediction) {
                    // Update existing prediction
                    const { data, error } = await supabaseClient
                        .from('predictions')
                        .update(predictionData)
                        .eq('id', existingPrediction.id)
                        .select()
                        .single();
                    
                    if (error) throw error;
                    result = data;
                } else {
                    // Insert new prediction
                    const { data, error } = await supabaseClient
                        .from('predictions')
                        .insert(predictionData)
                        .select()
                        .single();
                    
                    if (error) throw error;
                    result = data;
                    existingPrediction = result;
                }
                
                showMessage('Predictions saved successfully! 🎺', 'success');
                
                // Update button text
                submitBtn.textContent = 'Update Predictions';
                
                // Redirect after a short delay
                setTimeout(() => {
                    window.location.href = '/predictions-dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error saving predictions:', error);
                showMessage('Error saving predictions. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = existingPrediction ? 'Update Predictions' : 'Submit Predictions';
            }
        }

        // Show message to user
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('submitMsg');
            msg.textContent = text;
            msg.className = `submit-msg ${type}`;
            msg.classList.add('show');
            
            setTimeout(() => {
                msg.classList.remove('show');
            }, 5000);
        }

        // Initialize the page when loaded
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
