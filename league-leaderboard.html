<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fantasy Marching - Global League Leaderboard</title>
  <link rel="icon" href="/images/favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.75rem;
    }

    .page-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.4rem;
        text-align: center;
    }

    .page-subtitle {
        text-align: center;
        color: var(--text-2);
        font-size: 0.82rem;
        margin-bottom: 2rem;
    }

    .leaderboard-controls {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin-bottom: 1.5rem;
    }

    .leaderboard-toggle-btn {
        background: var(--s3);
        color: var(--text-2);
        border: 1px solid var(--border);
        padding: 0.45rem 1rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.1s, background 0.1s;
        font-family: var(--body);
    }

    .leaderboard-toggle-btn:hover { color: var(--text); }
    .leaderboard-toggle-btn.active { background: var(--teal); color: var(--bg); border-color: var(--teal); }

    .leaderboard-container {
        background: var(--s1);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1.25rem;
    }

    .leaderboard-entry {
        display: flex;
        align-items: center;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: var(--s2);
        border-radius: 4px;
        border: 1px solid var(--border);
        transition: background 0.1s;
    }

    .leaderboard-entry:last-child { margin-bottom: 0; }
    .leaderboard-entry:hover { background: var(--s3); }
    .leaderboard-entry.highlight { background: var(--teal-bg); border-color: var(--teal-dim); }

    .rank {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        margin-right: 1rem;
        font-size: 0.78rem;
        font-family: var(--mono);
        flex-shrink: 0;
    }

    .rank-1 { background: #b8860b; color: #fff; }
    .rank-2 { background: var(--s3); color: var(--text); border: 1px solid #888; }
    .rank-3 { background: #7c4a1e; color: #fff; }
    .rank-default { background: var(--s3); color: var(--text-2); border: 1px solid var(--border); }

    .player-info {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .player-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--s3);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.72rem;
        color: var(--teal);
        flex-shrink: 0;
        overflow: hidden;
    }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .player-name {
        font-weight: 600;
        color: var(--text);
        font-size: 0.85rem;
    }

    .player-stats {
        display: flex;
        align-items: center;
        gap: 2rem;
    }

    .stat-item { text-align: right; }

    .stat-value {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--teal);
        font-family: var(--mono);
    }

    .stat-label {
        font-size: 0.72rem;
        color: var(--text-2);
        margin-top: 0.1rem;
    }

    .loading-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--s3);
        border-top-color: var(--teal);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--teal);
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 500;
        margin-bottom: 1.5rem;
        transition: opacity 0.1s;
    }

    .back-link:hover { opacity: 0.8; }

    .pagination-btn {
        background: var(--s3);
        color: var(--text-2);
        border: 1px solid var(--border);
        padding: 0.45rem 1rem;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.1s, background 0.1s;
        font-family: var(--body);
        font-size: 0.8rem;
    }

    .pagination-btn:hover:not(:disabled) { color: var(--text); background: var(--s2); }
    .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 600px) {
        .container { padding: 1rem; }
        .leaderboard-container { padding: 0.75rem; }
        .leaderboard-entry { flex-wrap: wrap; gap: 0.5rem; }
        .rank { margin-right: 0.5rem; }
        .player-stats { gap: 1rem; }
        .stat-item { text-align: center; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/dashboard.html" class="logo-link">
        <img src="images/logo.png" alt="Fantasy Marching" class="logo-img">
      </a>
      <nav class="nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/predictions-dashboard.html">Predictions</a>
        <a href="/league.html" class="active">League</a>
        <a href="/information.html">Information</a>
      </nav>
      <div class="header-right">
        <div class="user-profile" onclick="toggleUserMenu()">
          <div class="user-avatar" id="userAvatar"></div>
          <span class="user-name" id="userName">Loading...</span>
          <div class="profile-dropdown" id="profileDropdown">
            <a href="/profile.html" class="dropdown-item">
              <span>Profile</span>
            </a>
            <div class="dropdown-divider"></div>
            <a href="/admin.html" class="dropdown-item admin" id="adminLink" style="display:none;">
              <span>Admin Panel</span>
            </a>
            <div class="dropdown-divider" id="adminDivider" style="display:none;"></div>
            <div class="dropdown-item" onclick="logout()">
              <span>Logout</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <a href="/dashboard.html" class="back-link">← Back to Dashboard</a>
    <h1 class="page-title">Global League Leaderboard</h1>
    <p class="page-subtitle">See the top-performing teams across the global league</p>
    <div class="leaderboard-controls">
      <button class="leaderboard-toggle-btn active" id="pointsBtn" onclick="setLeagueLeaderboardMode('points')">Total Points</button>
      <button class="leaderboard-toggle-btn" id="averageBtn" onclick="setLeagueLeaderboardMode('average')">Average Weekly</button>
    </div>
    <div class="leaderboard-container">
      <div id="leaderboardContent" class="loading">
        <div class="loading-spinner"></div>
        <p>Loading leaderboard...</p>
      </div>
    </div>
    <!-- Pagination -->
    <div id="paginationControls" style="display: none; margin-top: 2rem; text-align: center;">
      <button class="pagination-btn" id="prevBtn" onclick="changePage(-1)">← Previous</button>
      <span style="margin: 0 1rem; color: var(--text-2);">
        Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
      </span>
      <button class="pagination-btn" id="nextBtn" onclick="changePage(1)">Next →</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    let currentUser = null;
    let currentPage = 1;
    let totalItems = 0;
    const itemsPerPage = 50;
	let leagueLeaderboardMode = 'points';

    async function initializePage() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        window.location.href = "/";
        return;
      }
      currentUser = user;
      await loadUserProfile();
      await loadLeaderboard();
    }

    async function loadUserProfile() {
      const profile = await window.fantasyMarching.renderHeaderUser(currentUser);
    }

    async function loadLeaderboard() {
      try {
        // get count
        const { count } = await supabaseClient
          .from("global_league_leaderboard")
          .select("*", { count: "exact", head: true });

        totalItems = count || 0;
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        const offset = (currentPage - 1) * itemsPerPage;
          let orderBy = leagueLeaderboardMode === 'average' ? 'average_points' : 'total_points';
        const { data: stats } = await supabaseClient
          .from("global_league_leaderboard")
          .select("*")
		  .order(orderBy, { ascending: false })
          .range(offset, offset + itemsPerPage - 1);

        if (!stats || stats.length === 0) {
          document.getElementById("leaderboardContent").innerHTML = `
            <p style="text-align: center; color: var(--text-2); padding: 2rem;">
              No leaderboard data available yet
            </p>`;
          document.getElementById("paginationControls").style.display = "none";
          return;
        }

        document.getElementById("currentPage").textContent = currentPage;
        document.getElementById("totalPages").textContent = totalPages;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage === totalPages;
        document.getElementById("paginationControls").style.display = "block";

        const container = document.getElementById("leaderboardContent");
container.innerHTML = stats.map((player, index) => {
  const isCurrentUser = player.user_id === currentUser.id;
  const globalRank = offset + index + 1;
  return `
    <div class="leaderboard-entry ${isCurrentUser ? 'highlight' : ''}">
      <div class="rank ${globalRank <= 3 ? `rank-${globalRank}` : 'rank-default'}">${globalRank}</div>
      <div class="player-info">
        <div class="player-avatar">${avatarHtml(player.avatar_url, player.username ? player.username[0].toUpperCase() : 'U')}</div>
        <a class="player-name" style="color: var(--teal); text-decoration: none;" href="/profile.html?userId=${encodeURIComponent(player.user_id)}">
          ${escapeHtml(player.username || 'User')}
        </a>
      </div>
      <div class="player-stats">
        <div class="stat-item">
          <div class="stat-value">${player.total_points}</div>
          <div class="stat-label">Total Points</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${player.average_points}</div>
          <div class="stat-label">Average Points</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${player.weeks_played || 0}</div>
          <div class="stat-label">Weeks Played</div>
        </div>
      </div>
    </div>
  `;
}).join("");


      } catch (error) {
        console.error("Error loading leaderboard:", error);
        document.getElementById("leaderboardContent").innerHTML = `
          <p style="text-align: center; color: #ff6b6b; padding: 2rem;">
            Error loading leaderboard data
          </p>`;
      }
    }

    function changePage(direction) {
      currentPage += direction;
      loadLeaderboard();
      document.querySelector(".leaderboard-container").scrollIntoView({ behavior: "smooth" });
    }

    function toggleUserMenu() {
      const dropdown = document.getElementById("profileDropdown");
      dropdown.classList.toggle("show");
      document.addEventListener("click", function closeDropdown(e) {
        if (!e.target.closest(".user-profile")) {
          dropdown.classList.remove("show");
          document.removeEventListener("click", closeDropdown);
        }
      });
    }
function setLeagueLeaderboardMode(mode) {
    leagueLeaderboardMode = mode;
    currentPage = 1;

    document.getElementById('pointsBtn').classList.toggle('active', mode === 'points');
    document.getElementById('averageBtn').classList.toggle('active', mode === 'average');

    loadLeaderboard();  // call the correct function
}
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    document.addEventListener("DOMContentLoaded", initializePage);
  </script>
</body>
</html>
