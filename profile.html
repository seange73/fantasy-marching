        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.75rem; }

        .stat-label { color: var(--text-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.2rem; }
        .stat-value-blue { font-weight: 700; font-size: 1rem; color: var(--teal); font-family: var(--mono); }

            background: var(--teal); color: var(--bg); border: none; border-radius: 4px;

            font-family: var(--body); font-size: 0.85rem; text-decoration: none; display: inline-block;

        .modal-overlay {

        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--s1); border: 1px solid var(--border); border-radius: 6px;
            padding: 1.75rem; max-width: 560px; width: 90%; max-height: 85vh; overflow-y: auto;
        }

        .modal-message { color: var(--text); line-height: 1.6; font-size: 0.85rem; }
        .modal-input {

            background: var(--s2); border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); font-size: 0.85rem; font-family: var(--body); margin: 0.75rem 0;

        .modal-btn { padding: 0.55rem 1.25rem; border-radius: 4px; font-weight: 600; cursor: pointer; border: none; font-size: 0.85rem; font-family: var(--body); }
        .modal-btn-primary { background: var(--teal); color: var(--bg); }
        .modal-btn-secondary { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
        @media (max-width: 768px) {

    <script>
let currentUser = null;
let isAdmin = false;
let userIdFromUrl = null;
let signedInUser = null; // just to keep header stable

// Initialize profile page
async function initializeProfile() {
  const urlParams = new URLSearchParams(window.location.search);
  userIdFromUrl = urlParams.get("userId");

  // always get the signed-in user first
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) {
    window.location.href = "/";
    return;
  }
  signedInUser = user;

  // then decide whose profile is being viewed
  if (userIdFromUrl) {
    currentUser = { id: userIdFromUrl }; // viewing someone else
  } else {
    currentUser = user; // viewing your own profile
  }

  // Load everything
  await Promise.all([
    loadUserProfile(),
    loadPredictionStats(),
    loadGlobalLeagueStats(),
    loadUserLeagues()
  ]);
}

// Load user profile
async function loadUserProfile() {
  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("username, avatar_url, is_admin, created_at")
    .eq("id", currentUser.id)
    .single();

  if (profile) {
    const username = profile.username || profile.email?.split("@")[0] || "Unknown";
    const initial = username[0].toUpperCase();
const { data: signedInProfile } = await supabaseClient
  .from("profiles")
  .select("username")
  .eq("id", signedInUser.id)
  .single();

    // use signedInUser to populate the header name *always*
const signedInName = signedInProfile?.username || signedInUser.email?.split("@")[0] || "User";
const signedInInitial = signedInName[0].toUpperCase();

    document.getElementById("userName").textContent = signedInName;
    document.getElementById("userAvatar").textContent = signedInInitial;

    // update the profile section with current profile data
    document.getElementById("profileUsername").textContent = username;
    document.getElementById("profileAvatarLarge").textContent = initial;

    // Format join date
    const joinDate = new Date(profile.created_at);
    const formattedDate = joinDate.toLocaleDateString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric"
    });
    document.getElementById("profileJoined").textContent = `Joined ${formattedDate}`;

    // only show admin panel if on your own profile
    if ((profile.is_admin || false) && (!userIdFromUrl || userIdFromUrl === signedInUser.id)) {
      document.getElementById("adminLink").style.display = "flex";
      document.getElementById("adminDivider").style.display = "block";
    }
  }
}


        // Load prediction stats
        async function loadPredictionStats() {
            try {
                // Get user's prediction stats
                const { data: stats } = await supabaseClient
                    .from('prediction_leaderboard')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (stats) {
                    // Get rank
                    const { count } = await supabaseClient
                        .from('prediction_leaderboard')
                        .select('*', { count: 'exact', head: true })
                        .gt('total_score', stats.total_score || 0);
                    
                    const rank = (count || 0) + 1;
                    const accuracy = (stats.average_accuracy * 100).toFixed(1);
                    
                    // Update display
                    document.getElementById('predictionRank').textContent = `#${rank}`;
                    document.getElementById('predictionScore').textContent = stats.total_score || '0';
                    document.getElementById('predictionAccuracy').textContent = `${accuracy}%`;
                } else {
                    document.getElementById('predictionRank').textContent = 'N/A';
                    document.getElementById('predictionScore').textContent = '0';
                    document.getElementById('predictionAccuracy').textContent = '0%';
                }
            } catch (error) {
                console.error('Error loading prediction stats:', error);
                document.getElementById('predictionRank').textContent = 'Error';
                document.getElementById('predictionScore').textContent = '-';
                document.getElementById('predictionAccuracy').textContent = '-';
            }
        }

        // Load global league stats
        async function loadGlobalLeagueStats() {
            try {
                // Get user's global league stats
                const { data: stats } = await supabaseClient
                    .from('global_league_leaderboard')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (stats) {
                    // Get rank
                    const { count } = await supabaseClient
                        .from('global_league_leaderboard')
                        .select('*', { count: 'exact', head: true })
                        .gt('total_points', stats.total_points || 0);
                    
                    const rank = (count || 0) + 1;
                    const avgPoints = stats.average_points || 0;
                    
                    // Update display
                    document.getElementById('globalRank').textContent = `#${rank}`;
                    document.getElementById('globalPoints').textContent = stats.total_points || '0';
                    document.getElementById('globalAverage').textContent = avgPoints;
                } else {
                    document.getElementById('globalRank').textContent = 'N/A';
                    document.getElementById('globalPoints').textContent = '0';
                    document.getElementById('globalAverage').textContent = '0';
                }
            } catch (error) {
                console.error('Error loading global league stats:', error);
                document.getElementById('globalRank').textContent = 'Error';
                document.getElementById('globalPoints').textContent = '-';
                document.getElementById('globalAverage').textContent = '-';
            }
        }
// Add the showModal function
function showModal(title, message, buttons, showInput = false) {
    const overlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalInput = document.getElementById('modalInput');
    const modalButtons = document.getElementById('modalButtons');
    
    modalTitle.textContent = title;
    modalMessage.innerHTML = message;
    
    if (showInput) {
        modalInput.style.display = 'block';
        modalInput.value = '';
        modalInput.focus();
    } else {
        modalInput.style.display = 'none';
    }
    
    modalButtons.innerHTML = '';
    buttons.forEach(button => {
        const btn = document.createElement('button');
        btn.className = `modal-btn ${button.primary ? 'modal-btn-primary' : 'modal-btn-secondary'}`;
        btn.textContent = button.text;
        btn.onclick = () => {
            const inputValue = showInput ? modalInput.value : null;
            closeModal();
            if (button.callback) {
                button.callback(inputValue);
            }
        };
        modalButtons.appendChild(btn);
    });
    
    overlay.classList.add('show');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOnOverlay(event) {
    if (event.target === event.currentTarget) {
        closeModal();
    }
}

        visual: '#2ECC71',
        music: '#E67E22'
    };
    return colors[caption] || '#4ecdc4';
}

async function viewGlobalTeamLineup() {
  try {
    // get the userId in the profile page
    const urlParams = new URLSearchParams(window.location.search);
    const profileUserId = urlParams.get("userId");

    // fallback to logged-in user if no profile id found
    let userId = profileUserId;
    if (!userId) {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) throw new Error("Not authenticated");
      userId = user.id;
    }

    // get their global team
	console.log("Checking for team with user_id =", userId);
    const { data: team, error: teamError } = await supabaseClient
      .from("global_league_teams")
      .select("*")
      .eq("user_id", userId)
      .maybeSingle();
console.log("team data", team, "teamError", teamError);
    if (teamError) throw teamError;
    if (!team) {
      showModal(
        "No Global Team",
        "This user has not joined the Global League yet.",
        [{ text: "OK", primary: true, callback: null }]
      );
      return;
    }

    // get their team roster
    const { data: roster, error: rosterError } = await supabaseClient
      .from("global_league_roster")
      .select("*")
      .eq("team_id", team.id);

    if (rosterError) throw rosterError;
    if (!roster || roster.length === 0) {
      showModal(
        "No Roster",
        "This user has not drafted any corps for their global team.",
        [{ text: "OK", primary: true, callback: null }]
      );
      return;
    }

    // get current week number
    const currentWeek = await getCurrentWeekFromDB();

    // hard-coded week ranges
    const weekDateRanges = [
      { start: new Date("2025-06-28"), end: new Date("2025-06-29") },
      { start: new Date("2025-06-30"), end: new Date("2025-07-06") },
      { start: new Date("2025-07-07"), end: new Date("2025-07-13") },
      { start: new Date("2025-07-14"), end: new Date("2025-07-20") },
      { start: new Date("2025-07-21"), end: new Date("2025-07-27") },
      { start: new Date("2025-07-28"), end: new Date("2025-08-03") },
    ];
    const weekRange = weekDateRanges[Math.max(0, currentWeek - 1)];

    // completed events in this week
    const { data: weekEvents } = await supabaseClient
      .from("events")
      .select("id")
      .gte("date", weekRange.start.toISOString().split("T")[0])
      .lte("date", weekRange.end.toISOString().split("T")[0])
      .eq("is_completed", true);

    const eventIds = weekEvents?.map(e => e.id) || [];
    let weekScores = {};

    if (eventIds.length > 0) {
      const { data: scores } = await supabaseClient
        .from("event_scores")
        .select("*")
        .in("event_id", eventIds);

      scores?.forEach(score => {
        if (!weekScores[score.corps_name]) {
          weekScores[score.corps_name] = {
            brass: [],
            percussion: [],
            guard: [],
            ge: [],
            visual: [],
            music: []
          };
        }
        if (score.brass_score !== null) weekScores[score.corps_name].brass.push(score.brass_score);
        if (score.percussion_score !== null) weekScores[score.corps_name].percussion.push(score.percussion_score);
        if (score.color_guard_score !== null) weekScores[score.corps_name].guard.push(score.color_guard_score);
        if (score.general_effect_score !== null) weekScores[score.corps_name].ge.push(score.general_effect_score);
        if (score.visual_score !== null) weekScores[score.corps_name].visual.push(score.visual_score);
        if (score.music_score !== null) weekScores[score.corps_name].music.push(score.music_score);
      });
    }

    let totalScore = 0;

    showModal(
      `Global League Lineup - Week ${currentWeek}`,
      "",
      [{ text: "Close", primary: true, callback: null }]
    );

    const modalMessage = document.getElementById("modalMessage");
    modalMessage.innerHTML = `
      <div style="display: grid; gap: 1rem; margin-top: 1rem;">
        ${['brass','percussion','guard','ge','visual','music'].map(caption => {
          const captionRoster = roster.filter(r => r.caption === caption);
          let captionTotal = 0;

          const rosterWithScores = captionRoster.map(r => {
            const corpsScores = weekScores[r.corps_name];
            let avgScore = 0;
            if (corpsScores && corpsScores[caption].length > 0) {
              avgScore = corpsScores[caption].reduce((sum,s) => sum+s,0) / corpsScores[caption].length;
              captionTotal += avgScore;
              totalScore += avgScore;
            }
            return { ...r, avgScore };
          });

          return `
            <div style="background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1rem; border-left: 3px solid ${getCaptionColor(caption)};">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                <div style="font-weight:600; color:${getCaptionColor(caption)};">
                  ${caption === 'guard' ? 'Color Guard' : caption === 'ge' ? 'General Effect' : caption === 'percussion' ? 'Percussion' : caption === 'visual' ? 'Visual' : caption === 'music' ? 'Music' : caption === 'brass' ? 'Brass' : caption}
                </div>
                <div style="font-weight:700; color:#4ecdc4;">
                  ${captionTotal.toFixed(2)}
                </div>
              </div>
              ${rosterWithScores.map(r => `
                <div style="padding:0.5rem 0; color:#e0e0e0; display:flex; justify-content:space-between;">
                  ${r.corps_name}
                  <span style="color:${r.avgScore>0?'#4ecdc4':'#666'};">
                    ${r.avgScore>0 ? r.avgScore.toFixed(2) : 'No score'}
                  </span>
                </div>
              `).join("") || '<div style="color:#666;">No selection</div>'}
            </div>
          `;
        }).join("")}
      </div>
      <div style="margin-top:1.5rem; padding: 1rem; background:linear-gradient(135deg,#4ecdc4 0%,#45b7d1 100%); border-radius:12px; text-align:center;">
        <div style="color: rgba(255,255,255,0.9); font-size:0.9rem;">Total Score</div>
        <div style="color:white; font-size:2rem; font-weight:800;">
          ${totalScore.toFixed(2)}
        </div>
      </div>
    `;

  } catch (error) {
    console.error("Error viewing global team lineup:", error);
    showModal(
      "Error",
      "Failed to load the global team lineup. Please try again.",
      [{ text: "OK", primary: true, callback: null }]
    );
  }
}

        // Load user's leagues
        async function loadUserLeagues() {
            try {
                // Get league memberships
                const { data: memberships } = await supabaseClient
                    .from('league_members')
                    .select(`
                        league_id,
                        role,
                        leagues (
                            id,
                            name,
                            is_global
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'active');
                
                if (!memberships || memberships.length === 0) {
                    document.getElementById('leaguesContent').innerHTML = `
                        <div class="no-data">
                            <p>No leagues</p>
                        </div>
                    `;
                    return;
                }
                
                // Get detailed stats for each league
                const leaguePromises = memberships.map(async (membership) => {
                    const league = membership.leagues;
                    
                    // Get user's team in this league
                    const { data: team } = await supabaseClient
                        .from('league_teams')
                        .select('*')
                        .eq('league_id', league.id)
                        .eq('user_id', currentUser.id)
                        .single();
                    
                    if (!team) {
                        return {
                            league,
                            record: '0-0',
                            avgPoints: 0,
                            rank: '-'
                        };
                    }
                    
                    // Get all matchups for this team
                    const { data: matchups } = await supabaseClient
                        .from('league_matchups')
                        .select('*')
                        .eq('league_id', league.id)
                        .or(`team1_id.eq.${team.id},team2_id.eq.${team.id}`)
                        .not('winner_id', 'is', null);
                    
                    let wins = 0;
                    let losses = 0;
                    let totalScore = 0;
                    let gamesPlayed = 0;
                    
                    matchups?.forEach(matchup => {
                        const isTeam1 = matchup.team1_id === team.id;
                        const teamScore = isTeam1 ? matchup.team1_score : matchup.team2_score;
                        
                        if (matchup.winner_id === team.id) {
                            wins++;
                        } else {
                            losses++;
                        }
                        
                        totalScore += teamScore || 0;
                        gamesPlayed++;
                    });
                    
                    const avgPoints = gamesPlayed > 0 ? (totalScore / gamesPlayed).toFixed(1) : '0';
                    
                    // Calculate rank
                    const { data: allTeams } = await supabaseClient
                        .from('league_teams')
                        .select('*')
                        .eq('league_id', league.id);
                    
                    // Simple ranking by win percentage
                    const winPct = gamesPlayed > 0 ? wins / gamesPlayed : 0;
                    let rank = 1;
                    
                    for (const otherTeam of allTeams || []) {
                        if (otherTeam.id === team.id) continue;
                        
                        // Get other team's record
                        const { data: otherMatchups } = await supabaseClient
                            .from('league_matchups')
                            .select('*')
                            .eq('league_id', league.id)
                            .or(`team1_id.eq.${otherTeam.id},team2_id.eq.${otherTeam.id}`)
                            .not('winner_id', 'is', null);
                        
                        let otherWins = 0;
                        let otherGames = 0;
                        
                        otherMatchups?.forEach(matchup => {
                            if (matchup.winner_id === otherTeam.id) otherWins++;
                            otherGames++;
                        });
                        
                        const otherWinPct = otherGames > 0 ? otherWins / otherGames : 0;
                        if (otherWinPct > winPct) rank++;
                    }
                    
                    return {
                        league,
                        record: `${wins}-${losses}`,
                        avgPoints,
                        rank: `${rank}/${allTeams?.length || 0}`
                    };
                });
                
                const leagueStats = await Promise.all(leaguePromises);
                
                // Display leagues
                const leaguesHTML = leagueStats.map(stats => `
                    <div class="league-entry">
                        <div class="league-name">
                            ${stats.league.name}
                            ${stats.league.is_global ? '<span class="global-badge">GLOBAL</span>' : ''}
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Record</div>
                            <div class="league-stat-value">${stats.record}</div>
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Avg Points</div>
                            <div class="league-stat-value">${stats.avgPoints}</div>
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Rank</div>
                            <div class="league-stat-value">${stats.rank}</div>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('leaguesContent').innerHTML = leaguesHTML || `
                    <div class="no-data">
                        <p>No league data available.</p>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading leagues:', error);
                document.getElementById('leaguesContent').innerHTML = `
                    <div class="no-data">
                        <p style="color: #ff6b6b;">Error loading league data</p>
                    </div>
                `;
            }
        }

        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeProfile);
    </script>
