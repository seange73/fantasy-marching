<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Fantasy Marching</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Styles */
        .header {
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 75px;
            width: auto;
            display: block;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 2rem;
            flex: 1;
            justify-content: center;
        }

        .nav-tab {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab.active {
            color: #4ecdc4;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            border-radius: 2px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            position: relative;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        /* Profile Dropdown */
        .profile-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .dropdown-item.admin {
            color: #4ecdc4;
        }

        .dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
        }

        .dropdown-icon {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Profile Header */
        .profile-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4ecdc4, #45b7d1, #6c5ce7);
        }

        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 3rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .profile-username {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 50%, #6c5ce7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .profile-email {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .profile-joined {
            color: #666;
            font-size: 0.9rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4ecdc4, #45b7d1);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .stat-title {
            color: #a0a0a0;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Leagues Section */
        .section {
            margin-bottom: 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .leagues-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            overflow: hidden;
        }

        .league-entry {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .league-entry:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .league-entry:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .league-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .league-stat {
            text-align: center;
        }

        .league-stat-label {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .league-stat-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #4ecdc4;
        }

        .global-badge {
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-left: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4ecdc4;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 2rem;
        }

        .stat-label {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 0.25rem;
        }

        .stat-value-blue {
            font-weight: 700;
            font-size: 1.2rem;
            color: #4ecdc4;
        }

/* Responsive Design */
@media (max-width: 768px) {
    .header-content {
        flex-wrap: nowrap;  /* Changed from wrap to nowrap */
        padding: 1rem;
    }
    .nav-tabs {
        flex: 1;  /* Changed to take available space */
        justify-content: center;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        scrollbar-width: thin;
    }
    .nav-tabs::-webkit-scrollbar {
        height: 6px;
    }
    .nav-tabs::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.3);
        border-radius: 4px;
    }
    .nav-tab {
        flex: 0 0 auto;
    }
    .user-profile {
        margin-left: auto;  /* This pushes it to the right */
    }
    .user-name {
        display: none;
    }
    .container {
        padding: 1rem;
    }
    .profile-header {
        padding: 2rem 1rem;
    }
    
    .profile-header > div {
        grid-template-columns: 1fr !important;
        gap: 2rem !important;
    }
    .stats-grid {
        grid-template-columns: 1fr;
    }
    .league-entry {
        grid-template-columns: 1fr;
        gap: 0.5rem;
        text-align: center;
    }
    .league-stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0;
    }
	    .btn {
        padding: 0.75rem 1.5rem;
        font-size: 0.9rem;
    }
    
    .modal {
        max-width: 95%;
        padding: 1.5rem;
    }
}

@media (max-width: 600px) and (orientation: portrait) {
    .logo-link {
        display: none;
    }
}

html {
    background-color: #0f0f23; 
}

@media (max-width: 1024px) and (orientation: landscape) {
    body {
        overflow-x: hidden;
    }
    
    .header-content,
    .container {
        max-width: none !important;
        width: 100% !important;
        margin: 0 !important;
        padding-left: 1rem;
        padding-right: 1rem;
    }
    .user-name {
        display: none;
    }
}
.btn {
    background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
    color: white;
    border: none;
    padding: 0.875rem 2rem;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    font-size: 1rem;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(78, 205, 196, 0.4);
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}
/* Modal Styles */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1100;
    animation: fadeIn 0.3s ease;
}

.modal-overlay.show {
    display: flex;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal {
    background: rgba(26, 26, 46, 0.98);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 2rem;
    max-width: 600px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.modal-header {
    margin-bottom: 1.5rem;
}

.modal-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #4ecdc4;
    margin-bottom: 0.5rem;
}

.modal-message {
    color: #e0e0e0;
    line-height: 1.5;
}

.modal-input {
    width: 100%;
    padding: 0.875rem;
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    color: white;
    font-size: 1rem;
    margin: 1rem 0;
    transition: all 0.2s ease;
}

.modal-input:focus {
    outline: none;
    border-color: #4ecdc4;
    box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2);
    background: rgba(255, 255, 255, 0.12);
}

.modal-buttons {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 2rem;
}

.modal-btn {
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    font-size: 0.95rem;
}

.modal-btn-primary {
    background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
    color: white;
}

.modal-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(78, 205, 196, 0.4);
}

.modal-btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.modal-btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
}
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/dashboard.html" class="logo-link">
                <img src="images/logo.png" alt="Fantasy Marching" class="logo">
            </a>
            
            <nav class="nav-tabs">
                <a href="/dashboard.html" class="nav-tab">Dashboard</a>
                <a href="/predictions-dashboard.html" class="nav-tab">Predictions</a>
                <a href="/league.html" class="nav-tab">League</a>
                <a href="/information.html" class="nav-tab">Information</a>
            </nav>
            
            <div class="user-profile" onclick="toggleUserMenu()">
                <div class="user-avatar" id="userAvatar">

                </div>
                <span class="user-name" id="userName">Loading...</span>
                
                <!-- Profile Dropdown -->
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="/profile.html" class="dropdown-item">
                        <span class="dropdown-icon">👤</span>
                        <span>Profile</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="/admin.html" class="dropdown-item admin" id="adminLink" style="display: none;">
                        <span class="dropdown-icon">🛡️</span>
                        <span>Admin Panel</span>
                    </a>
                    <div class="dropdown-divider" id="adminDivider" style="display: none;"></div>
                    <div class="dropdown-item" onclick="logout()">
                        <span class="dropdown-icon">🚪</span>

                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;">
                <!-- Left side: User info -->
                <div style="text-align: center;">
                    <div class="profile-avatar-large" id="profileAvatarLarge">
                        <!-- Will be populated with user initial -->
                    </div>
                    <h1 class="profile-username" id="profileUsername">Loading...</h1>
                    <p class="profile-joined" id="profileJoined">Loading...</p>
                </div>
                
                <!-- Right side: Stats -->
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <div style="text-align: center;">
                        <div class="stat-title">Predictions Performance</div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; margin-top: 1rem;">
                            <div>
                                <div class="stat-label">Rank</div>
                                <div class="stat-value-blue" id="predictionRank">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Score</div>
                                <div class="stat-value-blue" id="predictionScore">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Accuracy</div>
                                <div class="stat-value-blue" id="predictionAccuracy">-</div>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <div class="stat-title">Global League</div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; margin-top: 1rem;">
                            <div>
                                <div class="stat-label">Rank</div>
                                <div class="stat-value-blue" id="globalRank">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Points</div>
                                <div class="stat-value-blue" id="globalPoints">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Average</div>
                                <div class="stat-value-blue" id="globalAverage">-</div>
                            </div>
                        </div>
						        <button class="btn" style="
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
        " onclick="viewGlobalTeamLineup()">View Global League Lineup</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Leagues Section -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Active Leagues</h2>
            </div>
            
            <div class="leagues-container">
                <div id="leaguesContent">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading leagues...</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;
		let userIdFromUrl = null;
        // Initialize profile page
        async function initializeProfile() {
// try to get userId from the query string
const urlParams = new URLSearchParams(window.location.search);
const userIdFromUrl = urlParams.get("userId");

if (userIdFromUrl) {
    currentUser = { id: userIdFromUrl }; // treat as current for lookup
} else {
    // fallback to logged-in user
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
        window.location.href = '/';
        return;
    }
    currentUser = user;
}
            
            // Load all profile data
            await Promise.all([
                loadUserProfile(),
                loadPredictionStats(),
                loadGlobalLeagueStats(),
                loadUserLeagues()
            ]);
        }

        // Load user profile
        async function loadUserProfile() {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('username, avatar_url, is_admin, created_at')
                .eq('id', currentUser.id)
                .single();
            
if (profile) {
    const username = profile.username || profile.email?.split('@')[0] || "Unknown";
    const initial = username[0].toUpperCase();
    
    // Only update header name if showing own profile
    if (!userIdFromUrl || userIdFromUrl === currentUser.id) {
        document.getElementById('userName').textContent = username;
        document.getElementById('userAvatar').textContent = initial;
    }
    
    // Always update profile section
    document.getElementById('profileUsername').textContent = username;
    document.getElementById('profileAvatarLarge').textContent = initial;
    
    // Format join date
    const joinDate = new Date(profile.created_at);
    const formattedDate = joinDate.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
    document.getElementById('profileJoined').textContent = `Joined ${formattedDate}`;
    
    // Only show admin panel link if viewing own profile
    if ((profile.is_admin || false) && (!userIdFromUrl || userIdFromUrl === currentUser.id)) {
        document.getElementById('adminLink').style.display = 'flex';
        document.getElementById('adminDivider').style.display = 'block';
    }
}

        }

        // Load prediction stats
        async function loadPredictionStats() {
            try {
                // Get user's prediction stats
                const { data: stats } = await supabaseClient
                    .from('prediction_leaderboard')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (stats) {
                    // Get rank
                    const { count } = await supabaseClient
                        .from('prediction_leaderboard')
                        .select('*', { count: 'exact', head: true })
                        .gt('total_score', stats.total_score || 0);
                    
                    const rank = (count || 0) + 1;
                    const accuracy = (stats.average_accuracy * 100).toFixed(1);
                    
                    // Update display
                    document.getElementById('predictionRank').textContent = `#${rank}`;
                    document.getElementById('predictionScore').textContent = stats.total_score || '0';
                    document.getElementById('predictionAccuracy').textContent = `${accuracy}%`;
                } else {
                    document.getElementById('predictionRank').textContent = 'N/A';
                    document.getElementById('predictionScore').textContent = '0';
                    document.getElementById('predictionAccuracy').textContent = '0%';
                }
            } catch (error) {
                console.error('Error loading prediction stats:', error);
                document.getElementById('predictionRank').textContent = 'Error';

// Add the showModal function
function showModal(title, message, buttons, showInput = false) {
    const overlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalInput = document.getElementById('modalInput');
    const modalButtons = document.getElementById('modalButtons');
    
    modalTitle.textContent = title;
    modalMessage.innerHTML = message;
    
    if (showInput) {
        modalInput.style.display = 'block';
        modalInput.value = '';
        modalInput.focus();
    } else {
        modalInput.style.display = 'none';
    }
    
    modalButtons.innerHTML = '';
    buttons.forEach(button => {
        const btn = document.createElement('button');
        btn.className = `modal-btn ${button.primary ? 'modal-btn-primary' : 'modal-btn-secondary'}`;
        btn.textContent = button.text;
        btn.onclick = () => {
            const inputValue = showInput ? modalInput.value : null;
            closeModal();
            if (button.callback) {
                button.callback(inputValue);
            }
        };
        modalButtons.appendChild(btn);
    });
    
    overlay.classList.add('show');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOnOverlay(event) {
    if (event.target === event.currentTarget) {
        closeModal();
    }
}

// Add the getCaptionColor function
function getCaptionColor(caption) {
    const colors = {
        brass: '#FFD700',
        percussion: '#FF6B6B',
        guard: '#9B59B6',
        ge: '#3498DB',
        visual: '#2ECC71',
        music: '#E67E22'
    };
    return colors[caption] || '#4ecdc4';
}

async function viewGlobalTeamLineup() {
  try {
    // get the userId in the profile page
    const urlParams = new URLSearchParams(window.location.search);
    const profileUserId = urlParams.get("userId");

    // fallback to logged-in user if no profile id found
    let userId = profileUserId;
    if (!userId) {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) throw new Error("Not authenticated");
      userId = user.id;
    }

    // get their global team
    const { data: team, error: teamError } = await supabaseClient
      .from("global_league_teams")
      .select("*")
      .eq("user_id", userId)
      .maybeSingle();

    if (teamError) throw teamError;
    if (!team) {
      showModal(
        "No Global Team",
        "This user has not joined the Global League yet.",
        [{ text: "OK", primary: true, callback: null }]
      );
      return;
    }

    // get their team roster
    const { data: roster, error: rosterError } = await supabaseClient
      .from("global_league_roster")
      .select("*")
      .eq("team_id", team.id);

    if (rosterError) throw rosterError;
    if (!roster || roster.length === 0) {
      showModal(
        "No Roster",
        "This user has not drafted any corps for their global team.",
        [{ text: "OK", primary: true, callback: null }]
      );
      return;
    }

    // get current week number
    const currentWeek = await getCurrentWeekFromDB();

    // hard-coded week ranges
    const weekDateRanges = [
      { start: new Date("2025-06-28"), end: new Date("2025-06-29") },
      { start: new Date("2025-06-30"), end: new Date("2025-07-06") },
      { start: new Date("2025-07-07"), end: new Date("2025-07-13") },
      { start: new Date("2025-07-14"), end: new Date("2025-07-20") },
      { start: new Date("2025-07-21"), end: new Date("2025-07-27") },
      { start: new Date("2025-07-28"), end: new Date("2025-08-03") },
    ];
    const weekRange = weekDateRanges[Math.max(0, currentWeek - 1)];

    // completed events in this week
    const { data: weekEvents } = await supabaseClient
      .from("events")
      .select("id")
      .gte("date", weekRange.start.toISOString().split("T")[0])
      .lte("date", weekRange.end.toISOString().split("T")[0])
      .eq("is_completed", true);

    const eventIds = weekEvents?.map(e => e.id) || [];
    let weekScores = {};

    if (eventIds.length > 0) {
      const { data: scores } = await supabaseClient
        .from("event_scores")
        .select("*")
        .in("event_id", eventIds);

      scores?.forEach(score => {
        if (!weekScores[score.corps_name]) {
          weekScores[score.corps_name] = {
            brass: [],
            percussion: [],
            guard: [],
            ge: [],
            visual: [],
            music: []
          };
        }
        if (score.brass_score !== null) weekScores[score.corps_name].brass.push(score.brass_score);
        if (score.percussion_score !== null) weekScores[score.corps_name].percussion.push(score.percussion_score);
        if (score.color_guard_score !== null) weekScores[score.corps_name].guard.push(score.color_guard_score);
        if (score.general_effect_score !== null) weekScores[score.corps_name].ge.push(score.general_effect_score);
        if (score.visual_score !== null) weekScores[score.corps_name].visual.push(score.visual_score);
        if (score.music_score !== null) weekScores[score.corps_name].music.push(score.music_score);
      });
    }

    let totalScore = 0;

    showModal(
      `Global League Lineup - Week ${currentWeek}`,
      "",
      [{ text: "Close", primary: true, callback: null }]
    );

    const modalMessage = document.getElementById("modalMessage");
    modalMessage.innerHTML = `
      <div style="display: grid; gap: 1rem; margin-top: 1rem;">
        ${['brass','percussion','guard','ge','visual','music'].map(caption => {
          const captionRoster = roster.filter(r => r.caption === caption);
          let captionTotal = 0;

          const rosterWithScores = captionRoster.map(r => {
            const corpsScores = weekScores[r.corps_name];
            let avgScore = 0;
            if (corpsScores && corpsScores[caption].length > 0) {
              avgScore = corpsScores[caption].reduce((sum,s) => sum+s,0) / corpsScores[caption].length;
              captionTotal += avgScore;
              totalScore += avgScore;
            }
            return { ...r, avgScore };
          });

          return `
            <div style="background: rgba(255,255,255,0.03); border-radius: 12px; padding: 1rem; border-left: 3px solid ${getCaptionColor(caption)};">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                <div style="font-weight:600; color:${getCaptionColor(caption)};">
                  ${caption === 'guard' ? 'Color Guard' : caption === 'ge' ? 'General Effect' : caption}
                </div>
                <div style="font-weight:700; color:#4ecdc4;">
                  ${captionTotal.toFixed(2)}
                </div>
              </div>
              ${rosterWithScores.map(r => `
                <div style="padding:0.5rem 0; color:#e0e0e0; display:flex; justify-content:space-between;">
                  ${r.corps_name}
                  <span style="color:${r.avgScore>0?'#4ecdc4':'#666'};">
                    ${r.avgScore>0 ? r.avgScore.toFixed(2) : 'No score'}
                  </span>
                </div>
              `).join("") || '<div style="color:#666;">No selection</div>'}
            </div>
          `;
        }).join("")}
      </div>
      <div style="margin-top:1.5rem; padding: 1rem; background:linear-gradient(135deg,#4ecdc4 0%,#45b7d1 100%); border-radius:12px; text-align:center;">
        <div style="color: rgba(255,255,255,0.9); font-size:0.9rem;">Total Score</div>
        <div style="color:white; font-size:2rem; font-weight:800;">
          ${totalScore.toFixed(2)}
        </div>
      </div>
    `;

  } catch (error) {
    console.error("Error viewing global team lineup:", error);
    showModal(
      "Error",
      "Failed to load the global team lineup. Please try again.",
      [{ text: "OK", primary: true, callback: null }]
    );
  }
}

        // Load user's leagues
        async function loadUserLeagues() {
            try {
                // Get league memberships
                const { data: memberships } = await supabaseClient
                    .from('league_members')
                    .select(`
                        league_id,
                        role,
                        leagues (
                            id,
                            name,
                            is_global
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'active');
                
                if (!memberships || memberships.length === 0) {
                    document.getElementById('leaguesContent').innerHTML = `
                        <div class="no-data">
                            <p>No leagues</p>
                        </div>
                    `;
                    return;
                }
                
                // Get detailed stats for each league
                const leaguePromises = memberships.map(async (membership) => {
                    const league = membership.leagues;
                    
                    // Get user's team in this league
                    const { data: team } = await supabaseClient
                        .from('league_teams')
                        .select('*')
                        .eq('league_id', league.id)
                        .eq('user_id', currentUser.id)
                        .single();
                    
                    if (!team) {
                        return {
                            league,
                            record: '0-0',
                            avgPoints: 0,
                            rank: '-'
                        };
                    }
                    
                    // Get all matchups for this team
                    const { data: matchups } = await supabaseClient
                        .from('league_matchups')
                        .select('*')
                        .eq('league_id', league.id)
                        .or(`team1_id.eq.${team.id},team2_id.eq.${team.id}`)
                        .not('winner_id', 'is', null);
                    
                    let wins = 0;
                    let losses = 0;
                    let totalScore = 0;
                    let gamesPlayed = 0;
                    
                    matchups?.forEach(matchup => {
                        const isTeam1 = matchup.team1_id === team.id;
                        const teamScore = isTeam1 ? matchup.team1_score : matchup.team2_score;
                        
                        if (matchup.winner_id === team.id) {
                            wins++;
                        } else {
                            losses++;
                        }
                        
                        totalScore += teamScore || 0;
                        gamesPlayed++;
                    });
                    
                    const avgPoints = gamesPlayed > 0 ? (totalScore / gamesPlayed).toFixed(1) : '0';
                    
                    // Calculate rank
                    const { data: allTeams } = await supabaseClient
                        .from('league_teams')
                        .select('*')
                        .eq('league_id', league.id);
                    
                    // Simple ranking by win percentage
                    const winPct = gamesPlayed > 0 ? wins / gamesPlayed : 0;
                    let rank = 1;
                    
                    for (const otherTeam of allTeams || []) {
                        if (otherTeam.id === team.id) continue;
                        
                        // Get other team's record
                        const { data: otherMatchups } = await supabaseClient
                            .from('league_matchups')
                            .select('*')
                            .eq('league_id', league.id)
                            .or(`team1_id.eq.${otherTeam.id},team2_id.eq.${otherTeam.id}`)
                            .not('winner_id', 'is', null);
                        
                        let otherWins = 0;
                        let otherGames = 0;
                        
                        otherMatchups?.forEach(matchup => {
                            if (matchup.winner_id === otherTeam.id) otherWins++;
                            otherGames++;
                        });
                        
                        const otherWinPct = otherGames > 0 ? otherWins / otherGames : 0;
                        if (otherWinPct > winPct) rank++;
                    }
                    
                    return {
                        league,
                        record: `${wins}-${losses}`,
                        avgPoints,
                        rank: `${rank}/${allTeams?.length || 0}`
                    };
                });
                
                const leagueStats = await Promise.all(leaguePromises);
                
                // Display leagues
                const leaguesHTML = leagueStats.map(stats => `
                    <div class="league-entry">
                        <div class="league-name">
                            ${stats.league.name}
                            ${stats.league.is_global ? '<span class="global-badge">GLOBAL</span>' : ''}
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Record</div>
                            <div class="league-stat-value">${stats.record}</div>
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Avg Points</div>
                            <div class="league-stat-value">${stats.avgPoints}</div>
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Rank</div>
                            <div class="league-stat-value">${stats.rank}</div>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('leaguesContent').innerHTML = leaguesHTML || `
                    <div class="no-data">
                        <p>No league data available.</p>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading leagues:', error);
                document.getElementById('leaguesContent').innerHTML = `
                    <div class="no-data">
                        <p style="color: #ff6b6b;">Error loading league data</p>
                    </div>
                `;
            }
        }
