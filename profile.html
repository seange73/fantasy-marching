<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Fantasy Marching</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Styles */
        .header {
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 75px;
            width: auto;
            display: block;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 2rem;
            flex: 1;
            justify-content: center;
        }

        .nav-tab {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab.active {
            color: #4ecdc4;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            border-radius: 2px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            position: relative;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        /* Profile Dropdown */
        .profile-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .dropdown-item.admin {
            color: #4ecdc4;
        }

        .dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
        }

        .dropdown-icon {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Profile Header */
        .profile-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4ecdc4, #45b7d1, #6c5ce7);
        }

        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 3rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .profile-username {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 50%, #6c5ce7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .profile-email {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .profile-joined {
            color: #666;
            font-size: 0.9rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4ecdc4, #45b7d1);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .stat-title {
            color: #a0a0a0;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Leagues Section */
        .section {
            margin-bottom: 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .leagues-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            overflow: hidden;
        }

        .league-entry {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .league-entry:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .league-entry:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .league-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .league-stat {
            text-align: center;
        }

        .league-stat-label {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .league-stat-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #4ecdc4;
        }

        .global-badge {
            background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-left: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4ecdc4;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 2rem;
        }

        .stat-label {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 0.25rem;
        }

        .stat-value-blue {
            font-weight: 700;
            font-size: 1.2rem;
            color: #4ecdc4;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
                padding: 1rem;
            }

            .nav-tabs {
                order: 3;
                width: 100%;
                justify-content: space-around;
                margin-top: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .profile-header {
                padding: 2rem 1rem;
            }
            
            .profile-header > div {
                grid-template-columns: 1fr !important;
                gap: 2rem !important;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .league-entry {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                text-align: center;
            }

            .league-stat {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.5rem 0;
            }
        }

@media (max-width: 600px) and (orientation: portrait) {
  .logo-link {
    display: none;
  }
  .nav-tabs {
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    flex-wrap: nowrap;
    scrollbar-width: thin;
  }
  .nav-tabs::-webkit-scrollbar {
    height: 6px;
  }
  .nav-tabs::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
  }
  .nav-tab {
    flex: 0 0 auto;
  }
  .user-name {
    display: none;
  }
  @media (max-width: 600px) and (orientation: portrait) {
  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: nowrap;  /* Ensure items stay on one line */
  }
  
  .logo-link {
    display: none;
  }
  
  .nav-tabs {
    flex: 1;  /* Takes up available space */
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    flex-wrap: nowrap;
    scrollbar-width: thin;
  }
  
  .user-profile {
    order: 2;  /* Ensure it comes after nav-tabs */
    margin-left: 1rem;  /* Add some spacing */
    flex-shrink: 0;  /* Don't let it shrink */
  }
  
  .user-name {
    display: none;
  }
}
}

@media (max-width: 768px) {
  .header-content {
    flex-wrap: nowrap;   /* do NOT wrap */
    padding: 1rem;
  }
  .nav-tabs {
    flex: 1;
    justify-content: center;
  }
  .user-profile {
    margin-left: auto;
  }
  .user-name {
    display: none;
  }
}
html {
  background-color: #0f0f23; 
}

@media (max-width: 1024px) and (orientation: landscape) {
  body {
    overflow-x: hidden;  /* Add this to prevent horizontal scroll */
  }
  
  .header-content,
  .container {
    max-width: none !important;
    width: 100% !important;
    margin: 0 !important;
    padding-left: 1rem;
    padding-right: 1rem;
  }
    .user-name {
    display: none;
  }
}
@media (max-width: 600px) and (orientation: portrait) {
  .user-profile {
    margin-left: auto;
  }
}

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/dashboard.html" class="logo-link">
                <img src="images/logo.png" alt="Fantasy Marching" class="logo">
            </a>
            
            <nav class="nav-tabs">
                <a href="/dashboard.html" class="nav-tab">Dashboard</a>
                <a href="/predictions-dashboard.html" class="nav-tab">Predictions</a>
                <a href="/league.html" class="nav-tab">League</a>
                <a href="/contact.html" class="nav-tab">Contact Us</a>
            </nav>
            
            <div class="user-profile" onclick="toggleUserMenu()">
                <div class="user-avatar" id="userAvatar">
                    <!-- Will be populated with user initial or image -->
                </div>
                <span class="user-name" id="userName">Loading...</span>
                
                <!-- Profile Dropdown -->
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="/profile.html" class="dropdown-item">
                        <span class="dropdown-icon">👤</span>
                        <span>Profile</span>
                    </a>
                    <a href="/settings.html" class="dropdown-item">
                        <span class="dropdown-icon">⚙️</span>
                        <span>Settings</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="/admin.html" class="dropdown-item admin" id="adminLink" style="display: none;">
                        <span class="dropdown-icon">🛡️</span>
                        <span>Admin Panel</span>
                    </a>
                    <div class="dropdown-divider" id="adminDivider" style="display: none;"></div>
                    <div class="dropdown-item" onclick="logout()">
                        <span class="dropdown-icon">🚪</span>
                        <span>Logout</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;">
                <!-- Left side: User info -->
                <div style="text-align: center;">
                    <div class="profile-avatar-large" id="profileAvatarLarge">
                        <!-- Will be populated with user initial -->
                    </div>
                    <h1 class="profile-username" id="profileUsername">Loading...</h1>
                    <p class="profile-joined" id="profileJoined">Loading...</p>
                </div>
                
                <!-- Right side: Stats -->
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <div style="text-align: center;">
                        <div class="stat-title">Predictions Performance</div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; margin-top: 1rem;">
                            <div>
                                <div class="stat-label">Rank</div>
                                <div class="stat-value-blue" id="predictionRank">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Score</div>
                                <div class="stat-value-blue" id="predictionScore">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Accuracy</div>
                                <div class="stat-value-blue" id="predictionAccuracy">-</div>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <div class="stat-title">Global League</div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; margin-top: 1rem;">
                            <div>
                                <div class="stat-label">Rank</div>
                                <div class="stat-value-blue" id="globalRank">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Points</div>
                                <div class="stat-value-blue" id="globalPoints">-</div>
                            </div>
                            <div>
                                <div class="stat-label">Average</div>
                                <div class="stat-value-blue" id="globalAverage">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Leagues Section -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Active Leagues</h2>
            </div>
            
            <div class="leagues-container">
                <div id="leaguesContent">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading leagues...</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;
		let userIdFromUrl = null;
        // Initialize profile page
        async function initializeProfile() {
// try to get userId from the query string
const urlParams = new URLSearchParams(window.location.search);
const userIdFromUrl = urlParams.get("userId");

if (userIdFromUrl) {
    currentUser = { id: userIdFromUrl }; // treat as current for lookup
} else {
    // fallback to logged-in user
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
        window.location.href = '/';
        return;
    }
    currentUser = user;
}
            
            // Load all profile data
            await Promise.all([
                loadUserProfile(),
                loadPredictionStats(),
                loadGlobalLeagueStats(),
                loadUserLeagues()
            ]);
        }

        // Load user profile
        async function loadUserProfile() {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('username, avatar_url, is_admin, created_at')
                .eq('id', currentUser.id)
                .single();
            
if (profile) {
    const username = profile.username || profile.email?.split('@')[0] || "Unknown";
    const initial = username[0].toUpperCase();
    
    // Only update header name if showing own profile
    if (!userIdFromUrl || userIdFromUrl === currentUser.id) {
        document.getElementById('userName').textContent = username;
        document.getElementById('userAvatar').textContent = initial;
    }
    
    // Always update profile section
    document.getElementById('profileUsername').textContent = username;
    document.getElementById('profileAvatarLarge').textContent = initial;
    
    // Format join date
    const joinDate = new Date(profile.created_at);
    const formattedDate = joinDate.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
    document.getElementById('profileJoined').textContent = `Joined ${formattedDate}`;
    
    // Only show admin panel link if viewing own profile
    if ((profile.is_admin || false) && (!userIdFromUrl || userIdFromUrl === currentUser.id)) {
        document.getElementById('adminLink').style.display = 'flex';
        document.getElementById('adminDivider').style.display = 'block';
    }
}

        }

        // Load prediction stats
        async function loadPredictionStats() {
            try {
                // Get user's prediction stats
                const { data: stats } = await supabaseClient
                    .from('prediction_leaderboard')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (stats) {
                    // Get rank
                    const { count } = await supabaseClient
                        .from('prediction_leaderboard')
                        .select('*', { count: 'exact', head: true })
                        .gt('total_score', stats.total_score || 0);
                    
                    const rank = (count || 0) + 1;
                    const accuracy = (stats.average_accuracy * 100).toFixed(1);
                    
                    // Update display
                    document.getElementById('predictionRank').textContent = `#${rank}`;
                    document.getElementById('predictionScore').textContent = stats.total_score || '0';
                    document.getElementById('predictionAccuracy').textContent = `${accuracy}%`;
                } else {
                    document.getElementById('predictionRank').textContent = 'N/A';
                    document.getElementById('predictionScore').textContent = '0';
                    document.getElementById('predictionAccuracy').textContent = '0%';
                }
            } catch (error) {
                console.error('Error loading prediction stats:', error);
                document.getElementById('predictionRank').textContent = 'Error';
                document.getElementById('predictionScore').textContent = '-';
                document.getElementById('predictionAccuracy').textContent = '-';
            }
        }

        // Load global league stats
        async function loadGlobalLeagueStats() {
            try {
                // Get user's global league stats
                const { data: stats } = await supabaseClient
                    .from('global_league_leaderboard')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (stats) {
                    // Get rank
                    const { count } = await supabaseClient
                        .from('global_league_leaderboard')
                        .select('*', { count: 'exact', head: true })
                        .gt('total_points', stats.total_points || 0);
                    
                    const rank = (count || 0) + 1;
                    const avgPoints = stats.average_points || 0;
                    
                    // Update display
                    document.getElementById('globalRank').textContent = `#${rank}`;
                    document.getElementById('globalPoints').textContent = stats.total_points || '0';
                    document.getElementById('globalAverage').textContent = avgPoints;
                } else {
                    document.getElementById('globalRank').textContent = 'N/A';
                    document.getElementById('globalPoints').textContent = '0';
                    document.getElementById('globalAverage').textContent = '0';
                }
            } catch (error) {
                console.error('Error loading global league stats:', error);
                document.getElementById('globalRank').textContent = 'Error';
                document.getElementById('globalPoints').textContent = '-';
                document.getElementById('globalAverage').textContent = '-';
            }
        }

        // Load user's leagues
        async function loadUserLeagues() {
            try {
                // Get league memberships
                const { data: memberships } = await supabaseClient
                    .from('league_members')
                    .select(`
                        league_id,
                        role,
                        leagues (
                            id,
                            name,
                            is_global
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'active');
                
                if (!memberships || memberships.length === 0) {
                    document.getElementById('leaguesContent').innerHTML = `
                        <div class="no-data">
                            <p>You're not in any leagues yet.</p>
                            <a href="/league.html" style="color: #4ecdc4; text-decoration: none;">Join a league →</a>
                        </div>
                    `;
                    return;
                }
                
                // Get detailed stats for each league
                const leaguePromises = memberships.map(async (membership) => {
                    const league = membership.leagues;
                    
                    // Get user's team in this league
                    const { data: team } = await supabaseClient
                        .from('league_teams')
                        .select('*')
                        .eq('league_id', league.id)
                        .eq('user_id', currentUser.id)
                        .single();
                    
                    if (!team) {
                        return {
                            league,
                            record: '0-0',
                            avgPoints: 0,
                            rank: '-'
                        };
                    }
                    
                    // Get all matchups for this team
                    const { data: matchups } = await supabaseClient
                        .from('league_matchups')
                        .select('*')
                        .eq('league_id', league.id)
                        .or(`team1_id.eq.${team.id},team2_id.eq.${team.id}`)
                        .not('winner_id', 'is', null);
                    
                    let wins = 0;
                    let losses = 0;
                    let totalScore = 0;
                    let gamesPlayed = 0;
                    
                    matchups?.forEach(matchup => {
                        const isTeam1 = matchup.team1_id === team.id;
                        const teamScore = isTeam1 ? matchup.team1_score : matchup.team2_score;
                        
                        if (matchup.winner_id === team.id) {
                            wins++;
                        } else {
                            losses++;
                        }
                        
                        totalScore += teamScore || 0;
                        gamesPlayed++;
                    });
                    
                    const avgPoints = gamesPlayed > 0 ? (totalScore / gamesPlayed).toFixed(1) : '0';
                    
                    // Calculate rank
                    const { data: allTeams } = await supabaseClient
                        .from('league_teams')
                        .select('*')
                        .eq('league_id', league.id);
                    
                    // Simple ranking by win percentage
                    const winPct = gamesPlayed > 0 ? wins / gamesPlayed : 0;
                    let rank = 1;
                    
                    for (const otherTeam of allTeams || []) {
                        if (otherTeam.id === team.id) continue;
                        
                        // Get other team's record
                        const { data: otherMatchups } = await supabaseClient
                            .from('league_matchups')
                            .select('*')
                            .eq('league_id', league.id)
                            .or(`team1_id.eq.${otherTeam.id},team2_id.eq.${otherTeam.id}`)
                            .not('winner_id', 'is', null);
                        
                        let otherWins = 0;
                        let otherGames = 0;
                        
                        otherMatchups?.forEach(matchup => {
                            if (matchup.winner_id === otherTeam.id) otherWins++;
                            otherGames++;
                        });
                        
                        const otherWinPct = otherGames > 0 ? otherWins / otherGames : 0;
                        if (otherWinPct > winPct) rank++;
                    }
                    
                    return {
                        league,
                        record: `${wins}-${losses}`,
                        avgPoints,
                        rank: `${rank}/${allTeams?.length || 0}`
                    };
                });
                
                const leagueStats = await Promise.all(leaguePromises);
                
                // Display leagues
                const leaguesHTML = leagueStats.map(stats => `
                    <div class="league-entry">
                        <div class="league-name">
                            ${stats.league.name}
                            ${stats.league.is_global ? '<span class="global-badge">GLOBAL</span>' : ''}
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Record</div>
                            <div class="league-stat-value">${stats.record}</div>
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Avg Points</div>
                            <div class="league-stat-value">${stats.avgPoints}</div>
                        </div>
                        <div class="league-stat">
                            <div class="league-stat-label">Rank</div>
                            <div class="league-stat-value">${stats.rank}</div>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('leaguesContent').innerHTML = leaguesHTML || `
                    <div class="no-data">
                        <p>No league data available.</p>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading leagues:', error);
                document.getElementById('leaguesContent').innerHTML = `
                    <div class="no-data">
                        <p style="color: #ff6b6b;">Error loading league data</p>
                    </div>
                `;
            }
        }

        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeProfile);
    </script>
</body>
</html>
