<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Results - Fantasy Marching</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.75rem; }
        .event-header { text-align: center; margin-bottom: 2rem; }
        .event-title { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-2); font-size: 0.85rem; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--teal);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: opacity 0.1s;
        }
        .back-link:hover { opacity: 0.8; }
        .card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.25rem;
        }
        .leaderboard { background: var(--s2); border-radius: 4px; padding: 1rem; }
        .leaderboard-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        /* Predicted vs Actual side-by-side; stacks on narrow screens */
        .results-compare {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            align-items: start;
        }
        .results-compare .card { margin-bottom: 1.25rem; }
        @media (max-width: 760px) {
            .results-compare { grid-template-columns: 1fr; gap: 0; }
        }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem 0.5rem 44px;
            margin-bottom: 0.35rem;
            border-radius: 4px;
            position: relative;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .rank-number {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            font-weight: 700;
            font-family: var(--mono);
        }
        .corps-total { font-family: var(--mono); font-size: 0.85rem; }
        .gold { background: #b8860b; color: #fff; }
        .silver { background: var(--s3); color: var(--text); border: 1px solid #888; }
        .bronze { background: #7c4a1e; color: #fff; }
        .default { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
        .accuracy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            text-align: center;
        }
        .accuracy-item {
            background: var(--s2);
            padding: 1.25rem;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .accuracy-label {
            font-size: 0.72rem;
            color: var(--text-2);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .accuracy-value { font-size: 1.5rem; font-weight: 700; color: var(--teal); font-family: var(--mono); }
        .accuracy-percentage { font-size: 1.5rem; color: var(--teal); font-family: var(--mono); }
        .caption-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }
        .caption-item {
            background: var(--s2);
            padding: 1.25rem;
            border-radius: 4px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .caption-type {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .caption-pick { font-size: 0.85rem; color: var(--text-2); margin-bottom: 0.75rem; }
        .caption-result {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .caption-result.correct { background: var(--teal-bg); color: var(--teal); border: 1px solid var(--teal-dim); }
        .caption-result.incorrect { background: rgba(255,107,107,0.08); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
        .icon { width: 14px; height: 14px; fill: currentColor; }
        .loading { text-align: center; padding: 3rem 2rem; color: var(--text-2); }
        @media (max-width: 600px) {
            .accuracy-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/dashboard.html" class="logo-link">
                <img src="images/logo.png" alt="Fantasy Marching" class="logo-img">
            </a>
            <nav class="nav">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/predictions-dashboard.html" class="active">Predictions</a>
                <a href="/league.html">League</a>
                <a href="/information.html">Information</a>
            </nav>
            <div class="header-right">
                <div class="user-profile" onclick="toggleUserMenu()">
                    <div class="user-avatar" id="userAvatar"></div>
                    <span class="user-name" id="userName">Loading...</span>
                    <div class="profile-dropdown" id="profileDropdown">
                        <a href="/profile.html" class="dropdown-item"><span class="dropdown-icon">👤</span><span>Profile</span></a>
                        <div class="dropdown-divider"></div>
                        <a href="/admin.html" class="dropdown-item admin" id="adminLink" style="display:none;"><span class="dropdown-icon">🛡️</span><span>Admin Panel</span></a>
                        <div class="dropdown-divider" id="adminDivider" style="display:none;"></div>
                        <div class="dropdown-item" onclick="logout()"><span class="dropdown-icon">🚪</span><span>Logout</span></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <a href="/predictions-dashboard.html" class="back-link">← Back to All Events</a>
          <div id="loadingState" class="loading">
    <div class="loading-spinner"></div>
    <p>Loading results...</p>
  </div>
        <div class="event-header animate-in">
            <h1 class="event-title"></h1>
            <p class="subtitle"></p>
        </div>

        <!-- Predicted vs Actual Placements (side-by-side, stacks on mobile) -->
        <div class="results-compare">
        <div class="card">
            <div class="leaderboard">
                <h2 class="leaderboard-title">Your Predicted Placements</h2>
                <div id="leaderboard">
                    <div class="leaderboard-entry gold">
                        <div class="rank-number"></div>
                        <strong></strong>
                        <div class="corps-total"></div>
                    </div>
                    <div class="leaderboard-entry silver">
                        <div class="rank-number"></div>
                        <strong></strong>
                        <div class="corps-total"></div>
                    </div>
                    <div class="leaderboard-entry bronze">
                        <div class="rank-number"></div>
                        <strong></strong>
                        <div class="corps-total"></div>
                    </div>
                    <div class="leaderboard-entry default">
                        <div class="rank-number"></div>
                        <strong></strong>
                        <div class="corps-total"></div>
                    </div>
                    <div class="leaderboard-entry default">
                        <div class="rank-number"></div>
                        <strong></strong>
                        <div class="corps-total"></div>
                    </div>
                </div>
            </div>
        </div>
		<!-- Actual Placements -->
		<div class="card">
			<div class="leaderboard">
				<h2 class="leaderboard-title">Actual Placements</h2>
				<div id="actualLeaderboard">

				</div>
			</div>
		</div>
		</div>

        <!-- Caption Awards -->
        <div class="card">
            <h2 class="section-title">Caption Award Predictions</h2>
            <div class="caption-grid">
                <div class="caption-item">
                    <div class="caption-type"></div>
                    <div class="caption-pick"></div>
                    <div class="caption-result correct">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        </svg>
                        
                    </div>
                </div>
                <div class="caption-item">
                    <div class="caption-type"></div>
                    <div class="caption-pick"></div>
                    <div class="caption-result incorrect">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        </svg>
                        
                    </div>
                </div>
                <div class="caption-item">
                    <div class="caption-type"></div>
                    <div class="caption-pick"></div>
                    <div class="caption-result correct">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        </svg>
                        
                    </div>
                </div>
            </div>
        </div>
        <!-- Accuracy Summary -->
        <div class="card">
            <h2 class="section-title">Prediction Accuracy</h2>
            <div class="accuracy-grid">
                <div class="accuracy-item">
                    <div class="accuracy-label"></div>
                    <div class="accuracy-value"></div>
                </div>
                <div class="accuracy-item">
                    <div class="accuracy-label"></div>
                    <div class="accuracy-value"></div>
                </div>
                <div class="accuracy-item">
                    <div class="accuracy-label"></div>
                    <div class="accuracy-value accuracy-percentage"></div>
                </div>
            </div>
        </div>

        <!-- Points Breakdown -->
        <div class="card">
  <h2 class="section-title">How Predictions Are Scored</h2>
  <p style="text-align:center; color:#a0a0a0;">
    <a href="/information.html" style="color:#4ecdc4; text-decoration:underline;">Learn about scoring rules here</a>
  </p>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
async function loadPredictionData() {
    const predictionId = getPredictionIdFromUrl();
    if (!predictionId) {
        alert("Missing prediction ID");
        return;
    }

    try {
        // 1. Get the prediction itself
        const { data: prediction, error: predError } = await supabaseClient
            .from("predictions")
            .select("*")
            .eq("id", predictionId)
            .single();

        if (predError || !prediction) {
            console.error(predError);
            alert("Prediction not found");
            return;
        }

        // 2. Get the scoring results
        const { data: result, error: resultError } = await supabaseClient
            .from("prediction_results")
            .select("*")
            .eq("prediction_id", predictionId)
            .single();

        if (resultError || !result) {
            console.error(resultError);
            alert("Scoring not found for this prediction");
            return;
        }

        // 3. Get the event details
        const { data: event, error: eventError } = await supabaseClient
            .from("events")
            .select("*")
            .eq("id", prediction.event_id)
            .single();

        if (eventError || !event) {
            console.error(eventError);
            alert("Event not found");
            return;
        }

        renderPredictionPage(prediction, result, event);

    } catch (e) {
        console.error(e);
        alert("Error loading prediction");
    }
	  document.getElementById("loadingState").style.display = "none";
}
function renderPredictionPage(prediction, result, event) {
    // event name/date
    document.querySelector(".event-title").textContent = event.name;
    const eventDate = new Date(event.date).toLocaleDateString("en-US", {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    document.querySelector(".subtitle").textContent = `${eventDate} • ${event.location || "TBD"}`;

    // accuracy summary
    document.querySelector(".accuracy-grid").innerHTML = `
        <div class="accuracy-item">
            <div class="accuracy-label">Points Earned</div>
            <div class="accuracy-value">${result.total_points}</div>
        </div>
        <div class="accuracy-item">
            <div class="accuracy-label">Possible Points</div>
            <div class="accuracy-value">${result.total_possible}</div>
        </div>
        <div class="accuracy-item">
            <div class="accuracy-label">Accuracy</div>
            <div class="accuracy-value accuracy-percentage">${Math.round(result.accuracy * 100)}%</div>
        </div>
    `;

    // predicted rankings
    const ordered = Object.entries(prediction.score_predictions || {})
        .sort((a,b) => b[1] - a[1]);

    const leaderboard = document.getElementById("leaderboard");
    leaderboard.innerHTML = ordered.map(([corps,score],index) => {
        let cls = "default";
        if(index === 0) cls = "gold";
        else if(index === 1) cls = "silver";
        else if(index === 2) cls = "bronze";
        return `
            <div class="leaderboard-entry ${cls}">
                <div class="rank-number">${index+1}</div>
                <strong>${corps}</strong>
                <div class="corps-total">${score.toFixed(3)}</div>
            </div>
        `;
    }).join("");

// actual rankings
if (event.final_scores) {
  const actualLeaderboard = document.getElementById("actualLeaderboard");
  actualLeaderboard.innerHTML = event.final_scores.map((result, index) => {
    let cls = "default";
    if (index === 0)      cls = "gold";
    else if (index === 1) cls = "silver";
    else if (index === 2) cls = "bronze";

    // use result.score (not total_score), and only N/A when null/undefined
    const displayScore = result.score != null
      ? result.score.toFixed(3)
      : 'N/A';

    return `
      <div class="leaderboard-entry ${cls}">
        <div class="rank-number">${result.placement}</div>
        <strong>${result.corps_name}</strong>
        <div class="corps-total">${displayScore}</div>
      </div>
    `;
  }).join("");
}

else {
    document.getElementById("actualLeaderboard").innerHTML = `
        <div style="text-align: center; color: #a0a0a0; padding: 2rem;">
            Actual results not yet available
        </div>
    `;
}
    // caption awards
const captions = ["brass","percussion","color_guard"];
const captionContainer = document.querySelector(".caption-grid");
captionContainer.innerHTML = captions.map(caption => {
    let userPick = prediction.caption_predictions?.[caption] || null;

    // fix: map 'guard' prediction key to 'color_guard'
    if (!userPick && caption === "color_guard") {
        userPick = prediction.caption_predictions?.["guard"] || "N/A";
    }
    userPick = userPick || "N/A";

    const actual = event.caption_winners?.[caption] || "N/A";
    const correct = userPick === actual;

    return `
        <div class="caption-item">
            <div class="caption-type">${caption.replace("_"," ").toUpperCase()}</div>
            <div class="caption-pick">Your Pick: ${userPick}</div>
            <div class="caption-result ${correct ? "correct" : "incorrect"}">
                ${correct ? "✔ Correct" : `✖ Missed (Actual: ${actual})`}
            </div>
        </div>
    `;
}).join("");


    // you can later expand to points breakdown by looping through corps if you store it
}
function getPredictionIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("predictionId");
}
        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const profile = document.querySelector('.user-profile');
            const dropdown = document.getElementById('profileDropdown');
            
            if (!profile.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });

        // Logout function
        function logout() {
            // TODO: Implement logout with Supabase
            console.log('Logout function to be implemented');
            window.location.href = '/login.html';
        }

        // Initialize user data
async function initializeUserData() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) {
        window.location.href = '/';
        return;
    }
    currentUser = user;

    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('username, avatar_url, is_admin')
        .eq('id', currentUser.id)
        .single();
    
    if (profile) {
        document.getElementById('userName').textContent = profile.username || currentUser.email.split('@')[0];
        const initial = (profile.username || currentUser.email)[0].toUpperCase();
        document.getElementById('userAvatar').textContent = initial;

        if (profile.is_admin) {
            document.getElementById('adminLink').style.display = 'flex';
            document.getElementById('adminDivider').style.display = 'block';
        }
    }
}
initializeUserData();
loadPredictionData();
    </script>
</body>
</html>
