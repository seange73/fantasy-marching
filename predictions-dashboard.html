<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Marching - Predictions Dashboard</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        .main-content { max-width: 1300px; margin: 0 auto; padding: 2rem 1.75rem; }
        .page-title { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; text-align: center; }
        .page-subtitle { text-align: center; color: var(--text-2); font-size: 0.82rem; margin-bottom: 1.5rem; }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 0.4rem 1rem;
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-2);
            font-size: 0.8rem;
            font-family: var(--body);
            transition: color 0.1s, background 0.1s;
        }
        .filter-tab:hover { color: var(--text); }
        .filter-tab.active { background: var(--teal); color: var(--bg); border-color: var(--teal); }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .event-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            cursor: pointer;
            transition: background 0.1s;
        }
        .event-card:hover { background: var(--s2); }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }
        .event-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
        .event-date { font-size: 0.8rem; color: var(--teal); display: flex; align-items: center; gap: 0.35rem; }
        .event-location { font-size: 0.8rem; color: var(--text-2); margin-top: 0.3rem; }
        .event-status {
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-upcoming { background: var(--teal-bg); color: var(--teal); border: 1px solid var(--teal-dim); }
        .status-predicted { background: rgba(255,215,0,0.1); color: #b8a600; border: 1px solid rgba(255,215,0,0.25); }
        .status-completed { background: rgba(255,107,107,0.08); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.25); }
        .event-details {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .corps-count { font-size: 0.8rem; color: var(--text-2); margin-bottom: 0.3rem; }
        .countdown { font-size: 0.8rem; color: var(--teal); font-weight: 600; }
        .action-button {
            width: 100%;
            padding: 0.55rem;
            background: var(--teal);
            color: var(--bg);
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.75rem;
            font-family: var(--body);
            transition: opacity 0.1s;
        }
        .action-button:hover:not(:disabled) { opacity: 0.85; }
        .action-button:disabled { background: var(--s3); color: var(--text-2); cursor: not-allowed; }
        .empty-state { text-align: center; padding: 3rem 2rem; color: var(--text-2); grid-column: 1 / -1; }
        .empty-state h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .loading { text-align: center; padding: 3rem 2rem; color: var(--text-2); }
        @media (max-width: 600px) {
            .events-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/dashboard.html" class="logo-link">
                <img src="images/logo.png" alt="Fantasy Marching" class="logo-img">
            </a>
            <nav class="nav">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/predictions-dashboard.html" class="active">Predictions</a>
                <a href="/league.html">League</a>
                <a href="/information.html">Information</a>
            </nav>
            <div class="header-right">
                <div class="user-profile" onclick="toggleUserMenu()">
                    <div class="user-avatar" id="userAvatar"></div>
                    <span class="user-name" id="userName">Loading...</span>
                    <div class="profile-dropdown" id="profileDropdown">
                        <a href="/profile.html" class="dropdown-item"><span class="dropdown-icon">👤</span><span>Profile</span></a>
                        <div class="dropdown-divider"></div>
                        <a href="/admin.html" class="dropdown-item admin" id="adminLink" style="display:none;"><span class="dropdown-icon">🛡️</span><span>Admin Panel</span></a>
                        <div class="dropdown-divider" id="adminDivider" style="display:none;"></div>
                        <div class="dropdown-item" onclick="logout()"><span class="dropdown-icon">🚪</span><span>Logout</span></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="page-title">Event Predictions</h1>
        <p class="page-subtitle">Select an event to make your predictions</p>

        <!-- Filter Tabs -->
<div class="filter-tabs">
    <div class="filter-tab active" onclick="filterEvents('upcoming')">Upcoming</div>
    <div class="filter-tab" onclick="filterEvents('all')">All Events</div>
    <div class="filter-tab" onclick="filterEvents('predicted')">My Predictions</div>
    <div class="filter-tab" onclick="filterEvents('completed')">Completed</div>
</div>

        <!-- Events Grid -->
        <div class="events-grid" id="eventsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading events...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;
        let allEvents = [];
        let userPredictions = {};
        let currentFilter = 'upcoming';

function formatEventDateTime(event) {
    if (!event.date || !event.time || !event.timezone) {
        return 'Date/time not set';
    }

    try {
        const { DateTime } = luxon;

        // event is scheduled in its own timezone:
        const dt = DateTime.fromISO(`${event.date}T${event.time}`, { zone: event.timezone });

        // convert to *local browser timezone* for display
        return dt.setZone(DateTime.local().zoneName).toLocaleString(DateTime.DATETIME_FULL);
    } catch (e) {
        console.error("Luxon parsing failed", e);
        return event.date;
    }
}


        // Initialize dashboard
        async function initPredictionsDashboard() {
            // Check authentication
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            currentUser = user;
            
            // Load user profile and check admin status
            await loadUserProfile();
            
            // Load events and predictions
            await loadEvents();
        }

        // Load user profile
        async function loadUserProfile() {
            const profile = await window.fantasyMarching.renderHeaderUser(currentUser);
            isAdmin = (profile && profile.is_admin) || false;
        }

        // Toggle user menu
        function toggleUserMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('show');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeDropdown(e) {
                if (!e.target.closest('.user-profile')) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Logout function
        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = '/';
            }
        }

        // Load all events and user predictions
        async function loadEvents() {
            // Load all events
            const { data: events, error: eventsError } = await supabaseClient
                .from('events')
                .select('*')
                .order('date', { ascending: true });
            
            if (eventsError) {
                console.error('Error loading events:', eventsError);
                return;
            }
            
            allEvents = events || [];
            
            // Load user's predictions
// Load user's predictions
const { data: predictions, error: predictionsError } = await supabaseClient
    .from('predictions')
    .select('id, event_id')
    .eq('user_id', currentUser.id);

if (!predictionsError && predictions) {
    predictions.forEach(pred => {
        userPredictions[pred.event_id] = pred.id;   // store the prediction id
    });
}
            
            // Display events
            displayEvents();
        }

        // Filter events
        function filterEvents(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayEvents();
        }

        // Display events based on current filter
        function displayEvents() {
		    const now = luxon.DateTime.now();
            let filteredEvents = allEvents;
            
            switch (currentFilter) {
case 'upcoming':
    filteredEvents = allEvents.filter(event => {
        const eventDateTime = luxon.DateTime.fromISO(`${event.date}T${event.time || '00:00'}`, {
            zone: event.timezone
        });
        const daysAway = eventDateTime.diff(now, 'days').days;
        return daysAway >= 0 && daysAway <= 7 && !event.is_completed;
    });
    break;
                case 'predicted':
                    filteredEvents = allEvents.filter(event => 
                        userPredictions[event.id]
                    );
                    break;
                case 'completed':
                    filteredEvents = allEvents.filter(event => 
                        event.is_completed
                    );
                    break;
            }
            
            const grid = document.getElementById('eventsGrid');
            
            if (filteredEvents.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No events found</h3>
                        <p>${getEmptyMessage()}</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredEvents.map(event => {
                const eventDateParts = event.date.split('-');  // YYYY-MM-DD
const eventDate = new Date(eventDateParts[0], eventDateParts[1] - 1, eventDateParts[2]);
                const eventDateTime = luxon.DateTime.fromISO(
  `${event.date}T${event.time || '00:00'}`,
  { zone: event.timezone }
);

const isPast = eventDateTime < now;
                const hasPredicted = userPredictions[event.id];
                const daysUntil = Math.round(eventDateTime.diff(now, 'days').days)
                
                let status = 'upcoming';
                let statusText = 'Upcoming';
                let buttonText = 'Make Predictions';
                let buttonDisabled = false;
if(hasPredicted) {
	status = 'predicted';
	statusText = 'Predicted';
	if(isPast && event.is_completed)
	{
		status = 'completed';
		statusText = 'Completed';
		buttonText = 'View Results';		
	}
	else if(isPast)
	{
		buttonText = 'Event Passed';
		buttonDisabled = true;
	}
	else
	{
		buttonText = 'Edit Predictions';
	}
}
else{
	if(event.is_completed) {
		status = 'completed';
		statusText = 'Completed';
		buttonText = 'Event Passed';
		buttonDisabled = true;
	}
	else if(isPast)
	{
		status = 'completed';
		statusText = 'Passed';
		buttonText = 'Event Passed';
		buttonDisabled = true;
	}
	else{
	status = 'upcoming';
	statusText = 'Upcoming';
	buttonText = 'Make Predictions';
	}
}             
if(daysUntil > 7) {
	buttonDisabled = true;
	buttonText = 'Predictions Not Yet Open';
	status='upcoming';
	statusText = 'Upcoming';
}
//unused logic  
/*if (event.is_completed) {
    status = 'completed';
    statusText = 'Completed';
    buttonText = 'View Results';
} 
else if (hasPredicted && isPast) {
    status = 'predicted';
    statusText = 'Predicted';
    buttonText = 'Event Passed';
    buttonDisabled = true;
} if (hasPredicted) {
    status = 'predicted';
    statusText = 'Predicted';
	if(isPast && event.is_completed)
	{
		status = 'completed';
		statusText = 'Completed';
		buttonText = 'View Results';
	}
	else if(isPast)
	{
		buttonText = 'Event Passed';
		buttonDisabled = true;
	}
	else
	{
	    buttonText = 'Edit Predictions';
	}
} else if (isPast) {
    buttonDisabled = true;
    buttonText = 'Event Passed';
} else if (daysUntil > 7) {
    buttonDisabled = true;
    buttonText = 'Predictions Not Yet Open';
}*/
                
                return `
                    <div class="event-card" onclick="${!buttonDisabled ? `goToEvent('${event.id}')` : ''}">
                        <div class="event-header">
                            <div>
                                <h3 class="event-title">${escapeHtml(event.name)}</h3>
                                <div class="event-date">
    <span>📅</span>
    ${formatEventDateTime(event)}
</div>
                                <div class="event-location">
                                    <span>📍</span>
                                    ${event.location || 'Location TBD'}
                                </div>
                            </div>
                            <div class="event-status status-${status}">
                                ${statusText}
                            </div>
                        </div>
                        
                        <div class="event-details">
                            ${event.corps_list ? `
                                <div class="corps-count">${event.corps_list.length} corps competing</div>
                            ` : ''}
                            ${!isPast && !event.is_completed && daysUntil >= 0 ? `
                                <div class="countdown">
                                    ${daysUntil === 0 ? 'Today!' : 
                                      daysUntil === 1 ? 'Tomorrow' : 
                                      `${daysUntil} days until event`}
                                </div>
                            ` : ''}
                            
                            <button class="action-button" ${buttonDisabled ? 'disabled' : ''}>
                                ${buttonText}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Get empty state message based on filter
        function getEmptyMessage() {
            switch (currentFilter) {
                case 'upcoming':
                    return 'No upcoming events scheduled';
                case 'predicted':
                    return 'You haven\'t made any predictions yet';
                case 'completed':
                    return 'No completed events yet';
                default:
                    return 'No events available';
            }
        }

        // Navigate to event prediction page
function goToEvent(eventId) {
    const event = allEvents.find(ev => ev.id === eventId);
    if (!event) return;

    if (event.is_completed && userPredictions[eventId]) {
        // go to results page
        window.location.href = `/prediction-results.html?predictionId=${userPredictions[eventId]}`;
    } else {
        // go to predictions page
        window.location.href = `/predictions.html?eventId=${eventId}`;
    }
}

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initPredictionsDashboard);
    </script>
</body>
</html>
